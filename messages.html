<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 max-w-4xl space-y-6">
        
        <header class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Inbox & Chats</h2>
            <p id="inbox-subtitle" class="text-xs text-slate-500 font-semibold">
              Communicate with local customers, coordinate designs, and send attachments.
            </p>
          </div>
        </header>

        <!-- Search Bar -->
        <section class="bg-white px-6 py-4 rounded-2xl border border-slate-50 custom-shadow flex items-center gap-3">
          <iconify-icon icon="lucide:search" class="text-slate-400 text-xl"></iconify-icon>
          <input
            type="text"
            id="chat-search"
            oninput="searchChats()"
            placeholder="Search customer chats by name..."
            class="bg-transparent border-none outline-none w-full text-xs font-semibold text-slate-700"
          >
        </section>

        <!-- Inbox list -->
        <section id="chats-list-container" class="bg-white rounded-3xl border border-slate-50 custom-shadow divide-y divide-slate-50 overflow-hidden">
          <!-- Populated from JS -->
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>

  <script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>

  <script>
    function getStoredProfessionals() {
      const saved = JSON.parse(localStorage.getItem("riseher_all_professionals") || "[]");
      if (saved.length) return saved;
      if (window.PROFESSIONALS && Array.isArray(window.PROFESSIONALS)) return window.PROFESSIONALS;
      return [];
    }

    function getStoredCustomers() {
      const saved = JSON.parse(localStorage.getItem("riseher_all_customers") || "[]");
      if (saved.length) return saved;
      if (window.CUSTOMERS && Array.isArray(window.CUSTOMERS)) return window.CUSTOMERS;
      return [];
    }

    function pick(arr, index, fallback = "") {
      if (!arr || !arr.length) return fallback;
      return arr[index % arr.length];
    }

    function buildCustomerInboxFromProfessionals() {
      const professionals = getStoredProfessionals();

      const replyTemplates = [
        "Hello! Yes, I can take this booking.",
        "Thanks for sharing the reference. I can customize it.",
        "Yes, I am available this weekend.",
        "Please share your preferred time slot.",
        "I can help with this requirement.",
        "Yes, alterations are available for this order.",
        "I can confirm the price after measurements.",
        "Home service is available in selected areas.",
        "Please share your design reference image.",
        "I can complete this within a few days."
      ];

      const timeTemplates = [
        "10 mins ago",
        "25 mins ago",
        "1 hour ago",
        "2 hours ago",
        "3 hours ago",
        "5 hours ago",
        "Yesterday",
        "2 days ago"
      ];

      return professionals.map((pro, index) => ({
        id: `chat-${pro.id}`,
        name: pro.name,
        business: pro.title || pro.category || "Professional",
        text: pick(replyTemplates, index, "Hello! I can help with your request."),
        time: pick(timeTemplates, index, "1 hour ago"),
        unread: index % 3 === 0,
        avatar: pro.avatar || "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=150&h=150",
        active: index % 4 === 0
      }));
    }

    function buildProfessionalInboxFromCustomers() {
      const professionals = getStoredProfessionals();
      const customers = getStoredCustomers();

      const customerNames = customers.length
        ? customers.map(c => c.name)
        : [
            "Anjali Sharma",
            "Divya Krishnan",
            "Sneha Reddy",
            "Kavitha Narayanan",
            "Farah Khan",
            "Meera S.",
            "Pooja R.",
            "Lavanya K.",
            "Harini V.",
            "Ritika M."
          ];

      const customerAvatars = customers.length
        ? customers.map(c => c.avatar)
        : [
            "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=100&h=100",
            "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=100&h=100",
            "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=100&h=100"
          ];

      const inquiryTemplates = [
        "Hi! Are you available this weekend?",
        "Can you share pricing details for this service?",
        "I want to book your service for an event.",
        "Can this be customized based on my reference?",
        "Do you offer urgent orders?",
        "Is home service available in my area?",
        "Can we discuss measurements and delivery date?",
        "I liked your profile and want to enquire.",
        "What is the estimated completion time?",
        "Can you help with bridal requirements?"
      ];

      const timeTemplates = [
        "12 mins ago",
        "30 mins ago",
        "1 hour ago",
        "2 hours ago",
        "4 hours ago",
        "Yesterday",
        "2 days ago",
        "3 days ago"
      ];

      return professionals.map((pro, index) => ({
        id: `chat-${pro.id}`,
        name: pick(customerNames, index, "Customer"),
        business: pro.name,
        text: pick(inquiryTemplates, index, "Hi! I want to know more about your service."),
        time: pick(timeTemplates, index, "1 hour ago"),
        unread: index % 2 === 0,
        avatar: pick(customerAvatars, index, "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=100&h=100"),
        active: index % 5 === 0
      }));
    }

    function seedInbox(force = false) {
      const role = Auth.getRole();
      const dbKey = role === "customer" ? "riseher_customer_inbox" : "riseher_inbox";

      const generatedInbox = role === "customer"
        ? buildCustomerInboxFromProfessionals()
        : buildProfessionalInboxFromCustomers();

      const existing = JSON.parse(localStorage.getItem(dbKey) || "[]");

      if (force || !existing.length || existing.length < generatedInbox.length) {
        localStorage.setItem(dbKey, JSON.stringify(generatedInbox));
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      seedInbox(true);

      const role = Auth.getRole();

      const subtitle = document.getElementById("inbox-subtitle");
      if (subtitle) {
        subtitle.textContent = role === "customer"
          ? "Communicate with women professionals, discuss sizing details, and view invoices."
          : "Communicate with local customers, coordinate designs, and send attachments.";
      }

      const searchInput = document.getElementById("chat-search");
      if (searchInput) {
        searchInput.placeholder = role === "customer"
          ? "Search professional chats by name..."
          : "Search customer chats by name...";
      }

      renderInboxList();
    });

    function renderInboxList(filterQuery = "") {
      const container = document.getElementById("chats-list-container");
      if (!container) return;

      const role = Auth.getRole();
      const dbKey = role === "customer" ? "riseher_customer_inbox" : "riseher_inbox";
      const inbox = JSON.parse(localStorage.getItem(dbKey)) || [];

      const filtered = inbox.filter(chat => {
        const q = filterQuery.toLowerCase();
        return (
          (chat.name || "").toLowerCase().includes(q) ||
          (chat.business || "").toLowerCase().includes(q) ||
          (chat.text || "").toLowerCase().includes(q)
        );
      });

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="p-12 text-center text-xs text-slate-400 font-semibold">
            <iconify-icon icon="lucide:message-square-dashed" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            No active conversations
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(chat => `
        <a href="chat-detail.html?id=${chat.id}" onclick="markChatRead('${chat.id}')" class="flex items-center gap-4 p-5 hover:bg-slate-50 transition-all ${chat.unread ? 'bg-blue-50/15' : ''}">
          <div class="relative shrink-0">
            <img src="${chat.avatar}" class="w-12 h-12 rounded-2xl object-cover ring-2 ring-slate-100" alt="${chat.name}">
            ${chat.active ? '<span class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></span>' : ''}
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-center justify-between mb-0.5 gap-3">
              <div class="min-w-0">
                <h4 class="font-extrabold text-slate-900 text-sm truncate">${chat.name}</h4>
                <p class="text-[10px] text-slate-400 font-semibold truncate">${chat.business || ""}</p>
              </div>
              <span class="text-[10px] text-slate-400 font-semibold shrink-0">${chat.time}</span>
            </div>
            <p class="text-xs ${chat.unread ? 'text-slate-900 font-bold' : 'text-slate-500'} truncate mt-0.5 font-medium">${chat.text}</p>
          </div>
          <div class="shrink-0 flex items-center gap-2">
            ${chat.unread ? '<span class="w-2.5 h-2.5 bg-blue-500 rounded-full"></span>' : ''}
            <iconify-icon icon="lucide:chevron-right" class="text-slate-300"></iconify-icon>
          </div>
        </a>
      `).join("");
    }

    window.searchChats = function() {
      const q = document.getElementById("chat-search").value;
      renderInboxList(q);
    };

    window.markChatRead = function(id) {
      const role = Auth.getRole();
      const dbKey = role === "customer" ? "riseher_customer_inbox" : "riseher_inbox";
      const inbox = JSON.parse(localStorage.getItem(dbKey)) || [];
      const updated = inbox.map(c => c.id === id ? { ...c, unread: false } : c);
      localStorage.setItem(dbKey, JSON.stringify(updated));
    };
  </script>
</body>
</html>
