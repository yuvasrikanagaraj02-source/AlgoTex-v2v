<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 space-y-8">
        
        <header class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Reviews & Ratings</h2>
            <p class="text-xs text-slate-500 font-semibold">Track rating distribution, manage customer feedback, and respond to replies.</p>
          </div>
        </header>

        <!-- Summary & Distribution Split -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="bg-white rounded-3xl p-6 border border-slate-50 custom-shadow flex flex-col items-center justify-center text-center space-y-2">
            <h2 class="text-5xl font-black text-slate-900">4.8</h2>
            <div class="flex gap-1 text-yellow-500 text-xl">
              <iconify-icon icon="lucide:star"></iconify-icon>
              <iconify-icon icon="lucide:star"></iconify-icon>
              <iconify-icon icon="lucide:star"></iconify-icon>
              <iconify-icon icon="lucide:star"></iconify-icon>
              <iconify-icon icon="lucide:star-half"></iconify-icon>
            </div>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Out of 5.0 Rating</p>
            <p class="text-[11px] text-slate-500 font-medium">Based on 120 customer reviews</p>
          </div>
          
          <div class="lg:col-span-2 bg-white rounded-3xl p-6 border border-slate-50 custom-shadow space-y-3 font-semibold text-xs text-slate-600">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Rating Distribution</h4>
            <div class="flex items-center gap-3">
              <span class="w-12 text-right">5 Star</span>
              <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                <div class="progress-bar h-full w-[75%] rounded-full"></div>
              </div>
              <span class="w-8 text-slate-950 font-bold">90</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="w-12 text-right">4 Star</span>
              <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                <div class="progress-bar h-full w-[17%] rounded-full"></div>
              </div>
              <span class="w-8 text-slate-950 font-bold">20</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="w-12 text-right">3 Star</span>
              <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                <div class="progress-bar h-full w-[6%] rounded-full"></div>
              </div>
              <span class="w-8 text-slate-950 font-bold">7</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="w-12 text-right">2 Star</span>
              <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                <div class="progress-bar h-full w-[2%] rounded-full"></div>
              </div>
              <span class="w-8 text-slate-950 font-bold">2</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="w-12 text-right">1 Star</span>
              <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                <div class="progress-bar h-full w-[1%] rounded-full"></div>
              </div>
              <span class="w-8 text-slate-950 font-bold">1</span>
            </div>
          </div>
        </section>

        <!-- Filters section -->
        <section class="flex flex-col md:flex-row gap-4 items-center justify-between">
          <div class="w-full md:flex-1 bg-white px-5 py-3 rounded-xl border border-slate-100 custom-shadow flex items-center gap-3">
            <iconify-icon icon="lucide:search" class="text-slate-400 text-lg"></iconify-icon>
            <input type="text" id="review-search" oninput="searchReviews()" placeholder="Search customer name..." class="bg-transparent border-none outline-none w-full text-xs font-semibold text-slate-700">
          </div>
          <div class="flex gap-2 w-full md:w-auto">
            <select id="review-filter-rating" onchange="searchReviews()" class="flex-1 md:flex-none h-11 px-4 bg-white border border-slate-100 rounded-xl text-xs font-bold text-slate-600 custom-shadow outline-none">
              <option value="all">All Stars</option>
              <option value="5">5 Star Only</option>
              <option value="4">4 Star Only</option>
              <option value="3">3 Star Only</option>
            </select>
            <select id="review-filter-service" onchange="searchReviews()" class="flex-1 md:flex-none h-11 px-4 bg-white border border-slate-100 rounded-xl text-xs font-bold text-slate-600 custom-shadow outline-none">
              <option value="all">All Services</option>
              <option value="Blouse Stitching">Blouse Stitching</option>
              <option value="Saree Stitching">Saree Stitching</option>
              <option value="Mehendi Artist">Mehendi Artist</option>
            </select>
          </div>
        </section>

        <!-- Reviews List logs -->
        <section id="reviews-list-container" class="space-y-6">
          <!-- Loaded dynamically from JS -->
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", renderReviewsPage);

    function renderReviewsPage() {
      const container = document.getElementById("reviews-list-container");
      if (!container) return;

      const reviews = JSON.parse(localStorage.getItem(Auth.KEYS.USER_REVIEWS)) || [];
      const searchQuery = document.getElementById("review-search").value.toLowerCase();
      const ratingFilter = document.getElementById("review-filter-rating").value;
      const serviceFilter = document.getElementById("review-filter-service").value;

      let filtered = reviews.filter(rev => rev.customerName.toLowerCase().includes(searchQuery));
      
      if (ratingFilter !== "all") {
        filtered = filtered.filter(rev => rev.rating === parseInt(ratingFilter));
      }
      if (serviceFilter !== "all") {
        filtered = filtered.filter(rev => rev.serviceName === serviceFilter);
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-3xl p-12 text-center text-xs text-slate-400 font-bold border border-slate-50 custom-shadow">
            <iconify-icon icon="lucide:star-off" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            No reviews match your filter parameters
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(rev => {
        let starsHtml = "";
        for (let i = 0; i < 5; i++) {
          starsHtml += `<iconify-icon icon="lucide:star" class="${i < rev.rating ? 'text-yellow-500' : 'text-slate-200'}"></iconify-icon>`;
        }

        const isReported = rev.reportStatus === "Reported";

        return `
          <div class="bg-white p-6 rounded-3xl border border-slate-50 custom-shadow space-y-5 relative">
            <div class="flex items-start justify-between">
              <div class="flex items-center gap-4">
                <img src="${rev.avatarUrl}" class="w-12 h-12 rounded-2xl object-cover shrink-0 ring-2 ring-pink-50" alt="${rev.customerName}">
                <div class="space-y-0.5">
                  <h4 class="font-extrabold text-slate-900 text-sm">${rev.customerName}</h4>
                  <p class="text-[10px] text-slate-400 font-bold uppercase">${rev.date} • ${rev.serviceName}</p>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <div class="flex text-yellow-500 text-sm">
                  ${starsHtml}
                </div>
                <!-- Moderation check flag -->
                <button onclick="toggleReportReview('${rev.id}')" class="w-8 h-8 rounded-full flex items-center justify-center text-xs ${isReported ? 'text-red-500 bg-red-50' : 'text-slate-300 hover:text-red-400'}" title="${isReported ? 'Unreport review' : 'Report inappropriate review'}">
                  <iconify-icon icon="lucide:flag"></iconify-icon>
                </button>
              </div>
            </div>

            <p class="text-xs text-slate-600 leading-relaxed font-semibold">${rev.text}</p>

            <!-- Reply details -->
            <div id="reply-box-${rev.id}" class="space-y-3">
              ${rev.replies.map(rep => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100/50 flex gap-3">
                  <iconify-icon icon="lucide:corner-down-right" class="text-slate-300 text-lg shrink-0 mt-0.5"></iconify-icon>
                  <div>
                    <h5 class="text-[10px] font-bold text-[#E91E63] uppercase">Your Response</h5>
                    <p class="text-xs text-slate-600 font-medium leading-relaxed mt-1">${rep.text}</p>
                    <span class="text-[9px] text-slate-400 mt-1 block">${rep.date}</span>
                  </div>
                </div>
              `).join("")}

              ${rev.replies.length === 0 ? `
                <button onclick="showReplyForm('${rev.id}')" class="h-9 px-4 bg-pink-50 text-[#E91E63] font-bold rounded-xl text-[10px] hover:bg-pink-100 transition-colors">Reply to Review</button>
              ` : `
                <button onclick="showReplyForm('${rev.id}', true)" class="text-[10px] font-bold text-slate-400 hover:text-slate-700 transition-colors ml-1">Edit Response</button>
              `}
            </div>

            <!-- Hidden Reply form box -->
            <div id="reply-form-${rev.id}" class="hidden space-y-3 pt-3 border-t border-slate-50">
              <textarea id="reply-input-${rev.id}" placeholder="Type your response here..." rows="3" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-semibold text-slate-700 focus:bg-white focus:border-[#E91E63] outline-none resize-none"></textarea>
              <div class="flex items-center gap-2 justify-end">
                <button onclick="hideReplyForm('${rev.id}')" class="h-8 px-4 text-slate-500 font-bold hover:text-slate-800 text-[10px]">Cancel</button>
                <button onclick="submitReply('${rev.id}')" class="h-8 px-4 bg-[#E91E63] text-white font-bold rounded-xl text-[10px] hover:bg-[#D81B60]">Post Reply</button>
              </div>
            </div>

          </div>
        `;
      }).join("");
    }

    window.searchReviews = renderReviewsPage;

    window.showReplyForm = function(id, isEdit = false) {
      document.getElementById(`reply-form-${id}`).classList.remove("hidden");
      document.getElementById(`reply-box-${id}`).classList.add("hidden");
      
      if (isEdit) {
        const reviews = JSON.parse(localStorage.getItem(Auth.KEYS.USER_REVIEWS)) || [];
        const rev = reviews.find(r => r.id === id);
        if (rev && rev.replies.length > 0) {
          document.getElementById(`reply-input-${id}`).value = rev.replies[0].text;
        }
      }
    };

    window.hideReplyForm = function(id) {
      document.getElementById(`reply-form-${id}`).classList.add("hidden");
      document.getElementById(`reply-box-${id}`).classList.remove("hidden");
    };

    window.submitReply = function(id) {
      const text = document.getElementById(`reply-input-${id}`).value.trim();
      if (!text) return;

      const reviews = JSON.parse(localStorage.getItem(Auth.KEYS.USER_REVIEWS)) || [];
      const updated = reviews.map(r => {
        if (r.id === id) {
          const date = new Date();
          const dateStr = date.toLocaleDateString([], { day: '2-digit', month: 'short', year: 'numeric' });
          return {
            ...r,
            replies: [{ text: text, date: dateStr }]
          };
        }
        return r;
      });

      localStorage.setItem(Auth.KEYS.USER_REVIEWS, JSON.stringify(updated));
      renderReviewsPage();
    };

    window.toggleReportReview = function(id) {
      const reviews = JSON.parse(localStorage.getItem(Auth.KEYS.USER_REVIEWS)) || [];
      const updated = reviews.map(r => {
        if (r.id === id) {
          return { ...r, reportStatus: r.reportStatus === "Reported" ? "Clean" : "Reported" };
        }
        return r;
      });
      localStorage.setItem(Auth.KEYS.USER_REVIEWS, JSON.stringify(updated));
      renderReviewsPage();
    };
  </script>
</body>
</html>
