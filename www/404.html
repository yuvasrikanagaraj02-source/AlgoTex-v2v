<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA] flex items-center justify-center min-h-screen p-6">
  <div class="max-w-md w-full text-center space-y-6 bg-white p-8 md:p-12 rounded-[32px] border border-slate-100 custom-shadow">
    <div class="w-20 h-20 bg-pink-50 rounded-full flex items-center justify-center mx-auto text-[#E91E63] animate-pulse">
      <iconify-icon icon="lucide:alert-circle" class="text-4xl"></iconify-icon>
    </div>
    
    <div class="space-y-2">
      <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">404</h1>
      <h2 class="text-lg font-bold text-slate-800">Page Not Found</h2>
      <p class="text-xs text-slate-400 font-semibold leading-relaxed">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
      </p>
    </div>

    <div>
      <a href="index.html" class="inline-flex items-center justify-center gap-2 h-12 px-6 w-full bg-[#E91E63] text-white font-bold rounded-xl text-xs hover:bg-[#D81B60] transition-colors shadow shadow-pink-100">
        <iconify-icon icon="lucide:arrow-left" class="text-sm"></iconify-icon>
        Back to Home
      </a>
    </div>
  </div>
</body>
</html>
