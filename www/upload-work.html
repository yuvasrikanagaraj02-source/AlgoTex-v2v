<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Manager - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 space-y-8">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Portfolio & Showcase</h2>
            <p class="text-xs text-slate-500 font-semibold">Manage, categorize and upload work samples to attract customers.</p>
          </div>
          <!-- Upload Button -->
          <div class="relative shrink-0">
            <input type="file" id="portfolio-add-input" multiple accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
            <button class="h-11 px-5 bg-[#E91E63] text-white font-bold rounded-xl flex items-center gap-2 hover:bg-[#D81B60] text-xs transition-all shadow-lg shadow-pink-100">
              <iconify-icon icon="lucide:upload-cloud"></iconify-icon>Upload New Work
            </button>
          </div>
        </header>

        <!-- Portfolio Insights stats bar -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-white p-6 rounded-3xl border border-slate-50 custom-shadow">
          <div class="space-y-1 text-center border-r border-slate-100">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Total Photos</p>
            <p id="insight-count" class="text-2xl font-black text-slate-900 mt-1">4</p>
          </div>
          <div class="space-y-1 text-center border-r border-slate-100">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Showcase Views</p>
            <p id="insight-views" class="text-2xl font-black text-slate-900 mt-1">635</p>
          </div>
          <div class="space-y-1 text-center border-r border-slate-100">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Design Saves</p>
            <p id="insight-saves" class="text-2xl font-black text-slate-900 mt-1">107</p>
          </div>
          <div class="space-y-1 text-center">
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Direct Clicks</p>
            <p id="insight-clicks" class="text-2xl font-black text-slate-900 mt-1">235</p>
          </div>
        </section>

        <!-- Filters tags bar -->
        <section class="flex gap-2 border-b border-slate-100 pb-px overflow-x-auto no-scrollbar font-bold text-xs">
          <button onclick="filterCategory('all')" id="tag-all" class="py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap">All Work</button>
          <button onclick="filterCategory('Bridal')" id="tag-Bridal" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Bridal Collection</button>
          <button onclick="filterCategory('Embroidery')" id="tag-Embroidery" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Embroidery & Aari</button>
          <button onclick="filterCategory('Tailoring')" id="tag-Tailoring" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Tailoring</button>
          <button onclick="filterCategory('Crafts')" id="tag-Crafts" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Crafts</button>
        </section>

        <!-- Gallery masonry grid -->
        <section id="portfolio-masonry-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
          <!-- Gallery photos injected dynamically -->
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>

  <!-- Modal for Photo preview popup -->
  <div id="preview-modal" onclick="closePreviewModal()" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[2000] hidden items-center justify-center p-4">
    <div class="relative max-w-2xl w-full max-h-[85vh] overflow-hidden rounded-3xl bg-white border border-slate-100/10 custom-shadow flex flex-col justify-end p-6">
      <img id="modal-img-el" src="" class="absolute inset-0 w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent pointer-events-none"></div>
      <button class="absolute top-4 right-4 w-10 h-10 rounded-full bg-black/40 backdrop-blur-md text-white flex items-center justify-center hover:bg-black/60 transition-colors">
        <iconify-icon icon="lucide:x" class="text-xl"></iconify-icon>
      </button>
      <div class="relative z-10 space-y-1 text-white">
        <h4 id="modal-title-el" class="text-base font-extrabold">Bridal Zardozi Blouse Design</h4>
        <span id="modal-category-el" class="text-[10px] font-bold uppercase tracking-wider bg-white/20 px-2 py-0.5 rounded">Bridal</span>
      </div>
    </div>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    let activeCategory = "all";

    document.addEventListener("DOMContentLoaded", () => {
      renderPortfolio();
      
      // Handle file uploads directly in portfolio
      const uploadInput = document.getElementById("portfolio-add-input");
      uploadInput.addEventListener("change", function() {
        const files = Array.from(this.files);
        const portfolio = JSON.parse(localStorage.getItem(Auth.KEYS.USER_PORTFOLIO)) || [];
        
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = function(e) {
            portfolio.unshift({
              id: "pf_" + Date.now() + "_" + Math.random().toString(36).substr(2, 4),
              title: "My Work Design",
              category: "Tailoring",
              imageUrl: e.target.result,
              views: 12,
              clicks: 2,
              saves: 1
            });
            localStorage.setItem(Auth.KEYS.USER_PORTFOLIO, JSON.stringify(portfolio));
            renderPortfolio();
          };
          reader.readAsDataURL(file);
        });
      });
    });

    function renderPortfolio() {
      const grid = document.getElementById("portfolio-masonry-grid");
      if (!grid) return;

      const portfolio = JSON.parse(localStorage.getItem(Auth.KEYS.USER_PORTFOLIO)) || [];
      let filtered = portfolio;

      if (activeCategory !== "all") {
        filtered = portfolio.filter(p => p.category === activeCategory);
      }

      // Render stats sum
      const totalViews = portfolio.reduce((a, b) => a + b.views, 0);
      const totalSaves = portfolio.reduce((a, b) => a + b.saves, 0);
      const totalClicks = portfolio.reduce((a, b) => a + b.clicks, 0);

      document.getElementById("insight-count").textContent = portfolio.length;
      document.getElementById("insight-views").textContent = totalViews;
      document.getElementById("insight-saves").textContent = totalSaves;
      document.getElementById("insight-clicks").textContent = totalClicks;

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full bg-white rounded-3xl p-12 text-center text-xs text-slate-400 font-bold border border-slate-50 custom-shadow">
            <iconify-icon icon="lucide:image" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            No portfolio uploads listed under this category
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(item => `
        <div class="bg-white rounded-3xl overflow-hidden border border-slate-50 custom-shadow group relative flex flex-col justify-between hover:scale-[1.02] transition-transform">
          <div class="aspect-[4/3] w-full overflow-hidden bg-slate-100 relative cursor-pointer" onclick="openPreviewModal('${item.imageUrl}', '${item.title}', '${item.category}')">
            <img src="${item.imageUrl}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white">
              <iconify-icon icon="lucide:maximize-2" class="text-2xl"></iconify-icon>
            </div>
            <span class="absolute top-3 left-3 px-2 py-0.5 bg-black/40 backdrop-blur-md text-[9px] font-bold text-white uppercase rounded">${item.category}</span>
          </div>
          
          <div class="p-4 space-y-3">
            <h4 class="font-extrabold text-slate-800 text-xs truncate leading-snug">${item.title}</h4>
            <div class="flex items-center justify-between text-[10px] font-bold text-slate-400 border-t border-slate-50 pt-3">
              <div class="flex items-center gap-2">
                <span class="flex items-center gap-0.5"><iconify-icon icon="lucide:eye"></iconify-icon>${item.views}</span>
                <span class="flex items-center gap-0.5"><iconify-icon icon="lucide:bookmark"></iconify-icon>${item.saves}</span>
              </div>
              <button onclick="deletePortfolioItem('${item.id}')" class="text-slate-400 hover:text-red-500 flex items-center" title="Delete work image">
                <iconify-icon icon="lucide:trash-2" class="text-sm"></iconify-icon>
              </button>
            </div>
          </div>
        </div>
      `).join("");
    }

    window.filterCategory = function(category) {
      activeCategory = category;
      
      // Update filter tabs classes
      ["all", "Bridal", "Embroidery", "Tailoring", "Crafts"].forEach(c => {
        const btn = document.getElementById(`tag-${c}`);
        if (!btn) return;
        if (c === category) {
          btn.className = "py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap font-bold text-xs";
        } else {
          btn.className = "py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap font-bold text-xs";
        }
      });

      renderPortfolio();
    };

    window.deletePortfolioItem = function(id) {
      if (confirm("Are you sure you want to delete this work sample?")) {
        const portfolio = JSON.parse(localStorage.getItem(Auth.KEYS.USER_PORTFOLIO)) || [];
        const filtered = portfolio.filter(p => p.id !== id);
        localStorage.setItem(Auth.KEYS.USER_PORTFOLIO, JSON.stringify(filtered));
        renderPortfolio();
      }
    };

    window.openPreviewModal = function(imgSrc, title, category) {
      const modal = document.getElementById("preview-modal");
      document.getElementById("modal-img-el").src = imgSrc;
      document.getElementById("modal-title-el").textContent = title;
      document.getElementById("modal-category-el").textContent = category;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    };

    window.closePreviewModal = function() {
      const modal = document.getElementById("preview-modal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    };
  </script>
</body>
</html>
