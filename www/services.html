<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Services - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 space-y-8">
        
        <header class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Services & Rates</h2>
            <p class="text-xs text-slate-500 font-semibold">Manage your pricing tiers, presets, and bulk volume discounts.</p>
          </div>
          <a href="service-form.html" class="h-11 px-5 bg-[#E91E63] text-white font-bold rounded-xl flex items-center gap-2 hover:bg-[#D81B60] text-xs transition-all shadow-lg shadow-pink-100 shrink-0">
            <iconify-icon icon="lucide:plus"></iconify-icon>Add New Service
          </a>
        </header>

        <!-- Status Filters bar -->
        <section class="flex gap-2 border-b border-slate-100 pb-px overflow-x-auto no-scrollbar font-bold text-xs">
          <button onclick="filterStatus('all')" id="filter-all" class="py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap">All Services</button>
          <button onclick="filterStatus('Active')" id="filter-Active" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Active</button>
          <button onclick="filterStatus('Inactive')" id="filter-Inactive" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Inactive</button>
          <button onclick="filterStatus('Draft')" id="filter-Draft" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Draft</button>
        </section>

        <!-- Dynamic split content: Sidebar vs. Service cards -->
        <div class="flex flex-col lg:flex-row gap-8 items-start">
          
          <!-- Pricing Presets Sidebar (Desktop Only) -->
          <aside class="w-full lg:w-[260px] shrink-0 space-y-6">
            <!-- Presets card -->
            <div class="bg-white rounded-3xl p-5 border border-slate-50 custom-shadow space-y-4">
              <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pricing Presets</h3>
              <div class="space-y-2 font-semibold text-xs text-left">
                <button onclick="highlightPresetRange(200, 500)" class="w-full p-3 bg-slate-50 rounded-xl hover:bg-pink-50 hover:text-[#E91E63] transition-colors flex flex-col items-start gap-1">
                  <span>Budget Friendly</span>
                  <span class="text-[10px] text-slate-400 font-medium">₹200 - ₹500</span>
                </button>
                <button onclick="highlightPresetRange(600, 1500)" class="w-full p-3 bg-pink-50 border border-pink-100 rounded-xl text-left flex flex-col items-start gap-1">
                  <span class="text-[#E91E63]">Standard Rate</span>
                  <span class="text-[10px] text-[#E91E63]/70">₹600 - ₹1500</span>
                </button>
                <button onclick="highlightPresetRange(2000, 10000)" class="w-full p-3 bg-slate-50 rounded-xl hover:bg-pink-50 hover:text-[#E91E63] transition-colors flex flex-col items-start gap-1">
                  <span>Premium Tier</span>
                  <span class="text-[10px] text-slate-400 font-medium">₹2000+</span>
                </button>
              </div>
            </div>

            <!-- Discount panels card -->
            <div class="bg-white rounded-3xl p-5 border border-slate-50 custom-shadow space-y-4">
              <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Bulk Discounts</h3>
              <div class="space-y-3 text-xs font-semibold text-slate-600">
                <div class="p-3 bg-slate-50 rounded-xl flex items-center justify-between">
                  <span>1 - 5 Items</span>
                  <span class="text-slate-800 font-bold">Standard</span>
                </div>
                <div class="p-3 bg-pink-50 border border-pink-100 rounded-xl flex items-center justify-between">
                  <span class="text-[#E91E63]">6 - 10 Items</span>
                  <span class="text-[#E91E63] font-bold">10% Off</span>
                </div>
                <div class="p-3 bg-slate-50 rounded-xl flex items-center justify-between">
                  <span>11+ Items</span>
                  <span class="text-slate-800 font-bold">20% Off</span>
                </div>
              </div>
            </div>
          </aside>

          <!-- Core list of service cards -->
          <div class="flex-1 w-full">
            <div id="services-cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <!-- Services injected here -->
            </div>
          </div>

        </div>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    let activeFilter = "all";
    let minPriceHighlight = null;
    let maxPriceHighlight = null;

    document.addEventListener("DOMContentLoaded", renderServices);

    function renderServices() {
      const container = document.getElementById("services-cards-grid");
      if (!container) return;

      const services = JSON.parse(localStorage.getItem(Auth.KEYS.USER_SERVICES)) || [];
      
      let filtered = services;
      
      // Filter by Active/Inactive/Draft status
      if (activeFilter !== "all") {
        filtered = services.filter(s => s.status === activeFilter);
      }

      // Highlight filter by pricing preset range
      if (minPriceHighlight !== null && maxPriceHighlight !== null) {
        filtered = filtered.filter(s => s.price >= minPriceHighlight && s.price <= maxPriceHighlight);
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="col-span-full bg-white rounded-3xl p-12 text-center text-xs text-slate-400 font-bold border border-slate-50 custom-shadow">
            <iconify-icon icon="lucide:scissors" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            No services listed match this status or rate range
          </div>
        `;
        return;
      }

      const categoryIcons = {
        "Tailoring": "lucide:scissors",
        "Beautician": "lucide:sparkles",
        "Mehendi Artist": "lucide:palette",
        "Embroidery Worker": "lucide:flower",
        "Home Teacher": "lucide:book-open",
        "Cooking Chef": "lucide:cooking-pot"
      };

      const colorClasses = {
        "Tailoring": "bg-pink-50 text-[#E91E63]",
        "Beautician": "bg-indigo-50 text-indigo-500",
        "Mehendi Artist": "bg-purple-50 text-purple-500",
        "Embroidery Worker": "bg-green-50 text-green-600",
        "Home Teacher": "bg-blue-50 text-blue-600",
        "Cooking Chef": "bg-yellow-50 text-yellow-600"
      };

      container.innerHTML = filtered.map(srv => {
        const icon = categoryIcons[srv.category] || "lucide:briefcase";
        const theme = colorClasses[srv.category] || "bg-slate-50 text-slate-500";
        const isDraft = srv.status === "Draft";

        return `
          <div class="bg-white rounded-3xl p-6 border border-slate-50 custom-shadow relative flex flex-col justify-between space-y-4 hover:scale-[1.01] transition-transform ${srv.status === 'Inactive' ? 'opacity-60' : ''}">
            <div class="flex gap-4">
              <div class="w-16 h-16 ${theme} rounded-2xl flex items-center justify-center shrink-0">
                <iconify-icon icon="${icon}" class="text-3xl"></iconify-icon>
              </div>
              <div class="flex-1 min-w-0 space-y-1">
                <div class="flex items-center justify-between">
                  <h4 class="font-extrabold text-slate-900 text-sm truncate pr-2">${srv.name}</h4>
                  <span class="px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-wider shrink-0 ${srv.status === 'Active' ? 'text-green-600 bg-green-50' : (isDraft ? 'text-slate-600 bg-slate-100' : 'text-orange-600 bg-orange-50')}">${srv.status}</span>
                </div>
                <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400">
                  <span>${srv.category}</span>
                  <div class="flex items-center gap-0.5 text-yellow-500">
                    <iconify-icon icon="lucide:star"></iconify-icon>
                    <span>${srv.rating.toFixed(1)}</span>
                    <span class="text-slate-300 font-normal">(${srv.reviewsCount})</span>
                  </div>
                </div>
                <p class="text-xs text-slate-500 line-clamp-2 leading-relaxed pt-1 font-medium">${srv.description}</p>
              </div>
            </div>

            <div class="flex items-center justify-between pt-4 border-t border-slate-50">
              <span class="text-lg font-black text-[#E91E63]">₹ ${srv.price}</span>
              <div class="flex items-center gap-1.5">
                <button onclick="toggleServiceStatus('${srv.id}')" class="h-9 px-3 bg-slate-50 hover:bg-slate-100 text-slate-600 font-bold rounded-xl text-[10px] active:scale-95 transition-all">
                  ${srv.status === 'Active' ? 'Deactivate' : 'Activate'}
                </button>
                <a href="service-form.html?id=${srv.id}" class="w-9 h-9 bg-slate-50 hover:bg-pink-50 hover:text-[#E91E63] text-slate-400 rounded-xl flex items-center justify-center transition-all">
                  <iconify-icon icon="lucide:edit-3" class="text-sm"></iconify-icon>
                </a>
                <button onclick="deleteService('${srv.id}')" class="w-9 h-9 bg-slate-50 hover:bg-red-50 hover:text-red-500 text-slate-400 rounded-xl flex items-center justify-center transition-all">
                  <iconify-icon icon="lucide:trash-2" class="text-sm"></iconify-icon>
                </button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    window.filterStatus = function(status) {
      activeFilter = status;
      
      // Update toggle buttons classes
      ["all", "Active", "Inactive", "Draft"].forEach(s => {
        const btn = document.getElementById(`filter-${s}`);
        if (!btn) return;
        if (s === status) {
          btn.className = "py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap";
        } else {
          btn.className = "py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap";
        }
      });

      renderServices();
    };

    window.highlightPresetRange = function(min, max) {
      if (minPriceHighlight === min && maxPriceHighlight === max) {
        // Toggle off
        minPriceHighlight = null;
        maxPriceHighlight = null;
      } else {
        minPriceHighlight = min;
        maxPriceHighlight = max;
      }
      renderServices();
    };

    window.toggleServiceStatus = function(id) {
      const services = JSON.parse(localStorage.getItem(Auth.KEYS.USER_SERVICES)) || [];
      const updated = services.map(s => {
        if (s.id === id) {
          return { ...s, status: s.status === "Active" ? "Inactive" : "Active" };
        }
        return s;
      });
      localStorage.setItem(Auth.KEYS.USER_SERVICES, JSON.stringify(updated));
      renderServices();
    };

    window.deleteService = function(id) {
      if (confirm("Are you sure you want to delete this service listing?")) {
        const services = JSON.parse(localStorage.getItem(Auth.KEYS.USER_SERVICES)) || [];
        const filtered = services.filter(s => s.id !== id);
        localStorage.setItem(Auth.KEYS.USER_SERVICES, JSON.stringify(filtered));
        renderServices();
      }
    };
  </script>
</body>
</html>
