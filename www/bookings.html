<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 space-y-8">
        
        <header class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Booking Requests</h2>
            <p class="text-xs text-slate-500 font-semibold">Track scheduled appointments, reviews, and transaction statuses.</p>
          </div>
        </header>

        <!-- Status Tabs -->
        <section class="flex gap-2 border-b border-slate-100 pb-px overflow-x-auto no-scrollbar font-bold text-xs">
          <button onclick="filterBookings('Upcoming')" id="tab-Upcoming" class="py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap">Upcoming Slots</button>
          <button onclick="filterBookings('Pending')" id="tab-Pending" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Pending Approval</button>
          <button onclick="filterBookings('Completed')" id="tab-Completed" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Completed Log</button>
          <button onclick="filterBookings('Cancelled')" id="tab-Cancelled" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Cancelled & Rejected</button>
        </section>

        <!-- Bookings Cards Container -->
        <section class="grid grid-cols-1 xl:grid-cols-2 gap-6" id="bookings-container-grid">
          <!-- Dynamically populated from JS -->
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    let activeStatusTab = "Upcoming";

    document.addEventListener("DOMContentLoaded", renderBookingsList);

    function renderBookingsList() {
      const container = document.getElementById("bookings-container-grid");
      if (!container) return;

      const bookings = JSON.parse(localStorage.getItem(Auth.KEYS.USER_BOOKINGS)) || [];
      
      // Filter logic
      let filtered = [];
      if (activeStatusTab === "Upcoming") {
        // Upcoming = Confirmed + In Progress
        filtered = bookings.filter(b => b.status === "Confirmed" || b.status === "In Progress");
      } else if (activeStatusTab === "Cancelled") {
        // Cancelled = Cancelled + Rejected
        filtered = bookings.filter(b => b.status === "Cancelled" || b.status === "Rejected");
      } else {
        filtered = bookings.filter(b => b.status === activeStatusTab);
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="col-span-full bg-white rounded-3xl p-12 text-center text-xs text-slate-400 font-bold border border-slate-50 custom-shadow">
            <iconify-icon icon="lucide:calendar" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            No booking records found under this status tab
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(b => {
        let badgeColor = "text-[#E91E63] bg-pink-50";
        if (b.status === "Confirmed") badgeColor = "text-green-600 bg-green-50";
        if (b.status === "In Progress") badgeColor = "text-indigo-600 bg-indigo-50";
        if (b.status === "Completed") badgeColor = "text-blue-600 bg-blue-50";
        if (b.status === "Cancelled" || b.status === "Rejected") badgeColor = "text-red-500 bg-red-50";

        return `
          <div class="bg-white rounded-3xl p-6 border border-slate-50 custom-shadow flex flex-col justify-between space-y-4 hover:scale-[1.01] transition-all">
            <div class="flex items-start justify-between gap-4">
              <div class="flex items-center gap-4">
                <img src="${b.avatarUrl}" class="w-12 h-12 rounded-2xl object-cover shrink-0" alt="Client">
                <div>
                  <h4 class="font-extrabold text-slate-900 text-sm">${b.customerName}</h4>
                  <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide mt-0.5">${b.id}</p>
                </div>
              </div>
              <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider ${badgeColor}">${b.status}</span>
            </div>

            <div class="border-t border-b border-slate-50 py-4 font-semibold text-xs text-slate-600 space-y-2">
              <div class="flex items-center justify-between">
                <span>Service requested</span>
                <span class="text-slate-800 font-bold">${b.serviceName}</span>
              </div>
              <div class="flex items-center justify-between">
                <span>Date & Time Slot</span>
                <span class="text-slate-800">${b.date} • ${b.time}</span>
              </div>
              <div class="flex items-center justify-between">
                <span>Pricing Rate</span>
                <span class="text-[#E91E63] font-black">₹ ${b.price}</span>
              </div>
            </div>

            <div class="flex items-center justify-between">
              <span class="text-[10px] font-bold text-slate-400">Payment: <span class="text-slate-600">${b.paymentStatus}</span></span>
              <a href="booking-details.html?id=${b.id}" class="h-9 px-4 bg-slate-900 text-white rounded-xl text-[10px] font-bold hover:bg-slate-800 flex items-center justify-center">Manage Booking</a>
            </div>
          </div>
        `;
      }).join("");
    }

    window.filterBookings = function(tabName) {
      activeStatusTab = tabName;
      
      // Toggle tab classes
      ["Upcoming", "Pending", "Completed", "Cancelled"].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        if (!btn) return;
        if (t === tabName) {
          btn.className = "py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap font-bold text-xs";
        } else {
          btn.className = "py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap font-bold text-xs";
        }
      });

      renderBookingsList();
    }
  </script>
</body>
</html>
