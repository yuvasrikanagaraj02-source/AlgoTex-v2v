<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA] h-screen overflow-hidden">

  <div class="flex h-full flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px] h-full bg-white">
      <!-- Chat Header -->
      <header class="h-20 border-b border-slate-100 px-6 md:px-8 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
          <a href="messages.html" class="w-10 h-10 flex items-center justify-center text-slate-800 hover:bg-slate-50 rounded-full transition-colors">
            <iconify-icon icon="lucide:arrow-left" class="text-xl"></iconify-icon>
          </a>
          <img id="chat-header-avatar" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=100&h=100" class="w-10 h-10 rounded-2xl object-cover shadow-sm" alt="User">
          <div class="flex flex-col">
            <h3 id="chat-header-name" class="text-sm font-extrabold text-slate-900 leading-snug">Meena Kumari</h3>
            <span class="text-[9px] font-bold text-green-500 flex items-center gap-1 mt-0.5"><span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>Online</span>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <a href="#" id="chat-call-btn" class="w-9 h-9 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500 hover:text-[#E91E63]"><iconify-icon icon="lucide:phone" class="text-base"></iconify-icon></a>
          <a href="booking-details.html?id=RH-28952" class="h-9 px-4 bg-pink-50 text-[#E91E63] font-bold rounded-xl text-[10px] flex items-center gap-1.5"><iconify-icon icon="lucide:calendar"></iconify-icon>Booking Details</a>
        </div>
      </header>

      <!-- Messages thread content container -->
      <div id="chat-messages-thread" class="flex-1 overflow-y-auto px-6 md:px-8 py-8 space-y-6 custom-scrollbar font-semibold text-xs text-slate-600">
        <!-- Message bubbles injected here -->
      </div>

      <!-- Quick Replies Bar -->
      <div class="px-6 md:px-8 py-2 shrink-0 border-t border-slate-50 flex gap-2 overflow-x-auto no-scrollbar bg-slate-50/50">
        <button onclick="sendQuickReply('Sure, I will share the photos by tonight.')" class="px-3 py-1.5 bg-white border border-slate-100 rounded-xl hover:border-[#E91E63] hover:text-[#E91E63] whitespace-nowrap text-[10px]">Send sample photos</button>
        <button onclick="sendQuickReply('Can you share your custom measurement sheet?')" class="px-3 py-1.5 bg-white border border-slate-100 rounded-xl hover:border-[#E91E63] hover:text-[#E91E63] whitespace-nowrap text-[10px]">Ask measurements</button>
        <button onclick="sendQuickReply('Sure, I can perform the alterations by tomorrow.')" class="px-3 py-1.5 bg-white border border-slate-100 rounded-xl hover:border-[#E91E63] hover:text-[#E91E63] whitespace-nowrap text-[10px]">Confirm alterations</button>
      </div>

      <!-- Chat Input controls -->
      <div class="p-6 shrink-0 border-t border-slate-100 bg-white">
        <div class="bg-slate-50 rounded-2xl p-2 flex items-center gap-2">
          <!-- File Attachments Menu (Hidden input & dropdown trigger) -->
          <div class="relative">
            <button onclick="toggleAttachDropdown(event)" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-slate-600 active:scale-95 transition-all">
              <iconify-icon icon="lucide:paperclip" class="text-xl"></iconify-icon>
            </button>
            <div id="attach-dropdown" class="absolute left-0 bottom-12 w-48 bg-white rounded-2xl custom-shadow-lg border border-slate-100 hidden z-50 overflow-hidden font-bold text-xs">
              <button onclick="triggerSimulatedFile('image')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-50 text-slate-700 text-left border-b border-slate-50"><iconify-icon icon="lucide:image" class="text-slate-400"></iconify-icon>Share Image</button>
              <button onclick="triggerSimulatedFile('measurement')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-50 text-slate-700 text-left border-b border-slate-50"><iconify-icon icon="lucide:rule" class="text-slate-400"></iconify-icon>Measurements Sheet</button>
              <button onclick="triggerSimulatedFile('design')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-50 text-slate-700 text-left border-b border-slate-50"><iconify-icon icon="lucide:scissors" class="text-slate-400"></iconify-icon>Reference Design</button>
              <button onclick="triggerSimulatedFile('invoice')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-50 text-slate-700 text-left"><iconify-icon icon="lucide:file-text" class="text-slate-400"></iconify-icon>Invoice PDF</button>
            </div>
          </div>

          <input type="text" id="chat-text-input" placeholder="Type your message here..." class="flex-1 bg-transparent border-none outline-none px-2 py-3 text-xs font-semibold text-slate-700 placeholder:text-slate-400">
          
          <button onclick="sendMessage()" class="w-10 h-10 flex items-center justify-center bg-[#E91E63] text-white rounded-xl shadow shadow-pink-100 hover:bg-[#D81B60] active:scale-95 transition-all shrink-0">
            <iconify-icon icon="lucide:send" class="text-lg"></iconify-icon>
          </button>
        </div>
      </div>

    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    let chatPartnerId = "chat-meena";
    
    const conversationsDb = {
      "chat-meena": {
        name: "Meena Kumari",
        avatar: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=100&h=100",
        phone: "+91 98765 43210",
        messages: [
          { sender: "customer", text: "Hi Priya! I saw your recent bridal blouse designs on the dashboard. I have a question about the intricate Aari work design with the gold thread. Is that customizable for different blouse colors?", time: "10:12 AM" },
          { sender: "me", text: "Hello Meena! Yes, absolutely. All my Aari embroidery designs are fully customizable. We can definitely adapt the gold thread pattern to match any fabric color you prefer.", time: "10:15 AM" },
          { sender: "customer", text: "Hi! Can you do rush tailoring service for Goregaon?", time: "2 hours ago" }
        ]
      },
      "chat-anjali": {
        name: "Anjali Rao",
        avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=100&h=100",
        phone: "+91 98234 56789",
        messages: [
          { sender: "customer", text: "Can we customize the collar thread work color details?", time: "4 hours ago" }
        ]
      },
      "chat-saira": {
        name: "Saira Khan",
        avatar: "https://images.unsplash.com/photo-1598550874175-4d0fe4a2c90b?auto=format&fit=crop&q=80&w=100&h=100",
        phone: "+91 98111 22233",
        messages: [
          { sender: "customer", text: "Is the alterations service available for heavy silk sarees?", time: "1 day ago" }
        ]
      }
    };

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      chatPartnerId = urlParams.get("id") || "chat-meena";

      // If db not in localStorage, save it
      if (!localStorage.getItem("riseher_chats_database")) {
        localStorage.setItem("riseher_chats_database", JSON.stringify(conversationsDb));
      }

      loadChatDetails();
      
      // Close attachment menu when clicking outside
      document.addEventListener("click", () => {
        document.getElementById("attach-dropdown").classList.add("hidden");
      });
    });

    function loadChatDetails() {
      const db = JSON.parse(localStorage.getItem("riseher_chats_database")) || conversationsDb;
      const chat = db[chatPartnerId] || db["chat-meena"];

      document.getElementById("chat-header-name").textContent = chat.name;
      document.getElementById("chat-header-avatar").src = chat.avatar;
      document.getElementById("chat-call-btn").href = `tel:${chat.phone}`;

      const threadContainer = document.getElementById("chat-messages-thread");
      threadContainer.innerHTML = chat.messages.map(msg => {
        const isMe = msg.sender === "me";
        
        if (isMe) {
          return `
            <div class="flex items-end gap-3 ml-auto max-w-[75%] flex-row-reverse text-right">
              <div class="flex flex-col gap-1 items-end">
                <div class="chat-bubble-sent p-4 text-xs font-semibold leading-relaxed text-left">
                  ${msg.text}
                </div>
                <span class="text-[9px] text-slate-400 mr-1">${msg.time || 'Just now'}</span>
              </div>
            </div>
          `;
        } else {
          return `
            <div class="flex items-end gap-3 max-w-[75%]">
              <img src="${chat.avatar}" class="w-8 h-8 rounded-full object-cover shrink-0 mb-1" alt="Client">
              <div class="flex flex-col gap-1">
                <div class="chat-bubble-received p-4 text-xs leading-relaxed text-slate-700">
                  ${msg.text}
                </div>
                <span class="text-[9px] text-slate-400 ml-1">${msg.time || 'Just now'}</span>
              </div>
            </div>
          `;
        }
      }).join("");

      // Scroll to bottom
      threadContainer.scrollTop = threadContainer.scrollHeight;
    }

    window.toggleAttachDropdown = function(e) {
      e.stopPropagation();
      document.getElementById("attach-dropdown").classList.toggle("hidden");
    };

    window.sendMessage = function() {
      const input = document.getElementById("chat-text-input");
      const text = input.value.trim();
      if (!text) return;

      appendMessage(text, "me");
      input.value = "";
    };

    window.sendQuickReply = function(text) {
      appendMessage(text, "me");
    };

    function appendMessage(text, sender) {
      const db = JSON.parse(localStorage.getItem("riseher_chats_database")) || conversationsDb;
      const chat = db[chatPartnerId] || db["chat-meena"];

      const date = new Date();
      const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      chat.messages.push({
        sender: sender,
        text: text,
        time: timeStr
      });

      db[chatPartnerId] = chat;
      localStorage.setItem("riseher_chats_database", JSON.stringify(db));

      // Update in global inbox summary as well
      const inbox = JSON.parse(localStorage.getItem("riseher_inbox")) || [];
      const updatedInbox = inbox.map(c => c.id === chatPartnerId ? { ...c, text: text, time: "Just now" } : c);
      localStorage.setItem("riseher_inbox", JSON.stringify(updatedInbox));

      loadChatDetails();
    }

    // Trigger simulated attachments share
    window.triggerSimulatedFile = function(type) {
      let attachmentText = "";
      if (type === "image") attachmentText = "📸 [Shared Image]: Bridal Blouse Pattern layout design sample.jpg";
      if (type === "measurement") attachmentText = "📏 [Shared Measurements]: Bust: 36, Waist: 30, Length: 14.5, Shoulder: 14.0";
      if (type === "design") attachmentText = "🎨 [Shared Reference Design]: Peacock Motif embroidery blueprint model.png";
      if (type === "invoice") attachmentText = "📄 [Shared Invoice PDF]: #INV-28952 for Bridal Stitching (Advance Balance: ₹500)";

      appendMessage(attachmentText, "me");
    };
  </script>
</body>
</html>
