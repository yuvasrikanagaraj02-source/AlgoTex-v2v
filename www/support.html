<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help & Support - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 max-w-4xl space-y-8">
        
        <header class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Help Center</h2>
            <p class="text-xs text-slate-500 font-semibold">Find answers to FAQs, view setup guidelines, or reach support.</p>
          </div>
        </header>

        <!-- Categories & FAQ Split -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
          
          <!-- Categories list -->
          <div class="bg-white rounded-3xl p-5 border border-slate-50 custom-shadow space-y-1 font-bold text-xs">
            <button onclick="filterCategory('start')" id="cat-start" class="w-full flex items-center justify-between p-3.5 rounded-2xl sidebar-active transition-all">
              <span class="flex items-center gap-3"><iconify-icon icon="lucide:lightbulb" class="text-base"></iconify-icon>Getting Started</span>
              <iconify-icon icon="lucide:chevron-right"></iconify-icon>
            </button>
            <button onclick="filterCategory('payments')" id="cat-payments" class="w-full flex items-center justify-between p-3.5 rounded-2xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all">
              <span class="flex items-center gap-3"><iconify-icon icon="lucide:credit-card" class="text-base"></iconify-icon>Payments & Payouts</span>
              <iconify-icon icon="lucide:chevron-right"></iconify-icon>
            </button>
            <button onclick="filterCategory('bookings')" id="cat-bookings" class="w-full flex items-center justify-between p-3.5 rounded-2xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all">
              <span class="flex items-center gap-3"><iconify-icon icon="lucide:calendar" class="text-base"></iconify-icon>Bookings & Workflow</span>
              <iconify-icon icon="lucide:chevron-right"></iconify-icon>
            </button>
          </div>

          <!-- FAQ Accordion list (2 Cols) -->
          <div class="lg:col-span-2 space-y-4" id="faq-accordions-list">
            <!-- Accordion cards dynamically loaded -->
          </div>
        </div>

        <!-- Contact CTA cards -->
        <section class="bg-white rounded-3xl p-8 border border-slate-50 custom-shadow flex flex-col items-center text-center space-y-6">
          <div class="w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center shrink-0 shadow-sm"><iconify-icon icon="lucide:headphones" class="text-2xl"></iconify-icon></div>
          <div class="space-y-1.5">
            <h3 class="text-xl font-extrabold text-slate-900">Still need help?</h3>
            <p class="text-xs text-slate-500 font-semibold max-w-md">Our support team is online 24/7 to resolve technical queries and verify documents.</p>
          </div>
          <div class="flex flex-wrap justify-center gap-3 font-bold text-xs">
            <button onclick="openChatSupport()" class="h-12 px-6 bg-[#E91E63] text-white rounded-xl flex items-center gap-2 hover:bg-[#D81B60] transition-all shadow-lg shadow-pink-100"><iconify-icon icon="lucide:message-square" class="text-base"></iconify-icon>Start Live Chat</button>
            <a href="mailto:support@riseher.com" class="h-12 px-6 border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-xl flex items-center gap-2 transition-colors"><iconify-icon icon="lucide:mail" class="text-base"></iconify-icon>Email Support</a>
          </div>
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    const faqs = {
      start: [
        { q: "How do I verify my profile registration?", a: "Go to Edit Profile settings and upload a clear PDF/image of your Aadhar card or skills certification. Verification checks take 24-48 hours." },
        { q: "Can I register multiple micro-business skills?", a: "Yes, you can configure tags in your profile (e.g. Tailoring and Embroidery) and list distinct services for each category in the services menu." }
      ],
      payments: [
        { q: "How long do payouts take to credit?", a: "Auto-payouts settle directly into your HDFC Bank account every week. Manual withdrawal requests process instantly." },
        { q: "Are there platform commission fees?", a: "RiseHer is free to start. We charge a minimal 5% service fee on completed customer orders to maintain the platform." }
      ],
      bookings: [
        { q: "What is the booking workflow lifecycle?", a: "Bookings start as Requested. You can Accept or Reschedule. Once started, mark it In Progress, and finally Complete it to trigger payments." },
        { q: "How do I cancel confirmed bookings?", a: "Go to booking details and select Cancel Booking. This automatically refunds the customer's advance payment." }
      ]
    };

    let activeCategoryTab = "start";

    document.addEventListener("DOMContentLoaded", renderFaqs);

    function renderFaqs() {
      const container = document.getElementById("faq-accordions-list");
      if (!container) return;

      const items = faqs[activeCategoryTab] || faqs.start;

      container.innerHTML = items.map((faq, idx) => `
        <div class="bg-white rounded-3xl p-5 border border-slate-50 custom-shadow space-y-3 cursor-pointer" onclick="toggleAccordion('${idx}')">
          <div class="flex items-center justify-between font-bold text-xs text-slate-800">
            <span class="text-sm font-extrabold">${faq.q}</span>
            <iconify-icon icon="lucide:plus" id="faq-icon-${idx}" class="text-slate-400 text-lg transition-transform"></iconify-icon>
          </div>
          <p id="faq-ans-${idx}" class="text-xs text-slate-500 font-semibold leading-relaxed border-t border-slate-50 pt-3 hidden">${faq.a}</p>
        </div>
      `).join("");
    }

    window.filterCategory = function(cat) {
      activeCategoryTab = cat;
      
      ["start", "payments", "bookings"].forEach(c => {
        const btn = document.getElementById(`cat-${c}`);
        if (!btn) return;
        if (c === cat) {
          btn.className = "w-full flex items-center justify-between p-3.5 rounded-2xl sidebar-active transition-all font-bold text-xs";
        } else {
          btn.className = "w-full flex items-center justify-between p-3.5 rounded-2xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all font-bold text-xs";
        }
      });

      renderFaqs();
    };

    window.toggleAccordion = function(index) {
      const ans = document.getElementById(`faq-ans-${index}`);
      const icon = document.getElementById(`faq-icon-${index}`);
      
      if (ans.classList.contains("hidden")) {
        ans.classList.remove("hidden");
        icon.style.transform = "rotate(45deg)";
      } else {
        ans.classList.add("hidden");
        icon.style.transform = "rotate(0deg)";
      }
    };

    window.openChatSupport = function() {
      alert("Opening live chat connection panel... An agent will join shortly.");
    };
  </script>
</body>
</html>
