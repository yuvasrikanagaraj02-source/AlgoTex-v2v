<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews Given - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 max-w-4xl space-y-6">
        
        <header class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Reviews I've Given</h2>
            <p class="text-xs text-slate-500 font-semibold">Track feedback you've shared, ratings left, and replies from professionals.</p>
          </div>
        </header>

        <!-- Reviews Given Container -->
        <section id="customer-reviews-container" class="space-y-4">
          <!-- Dynamic reviews list -->
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderReviewsGiven();
    });

    function renderReviewsGiven() {
      const container = document.getElementById("customer-reviews-container");
      if (!container) return;

      const profile = Auth.getProfile();
      const customerName = profile.name || "Anjali Sharma";

      // Fetch reviews from riseher_reviews in localStorage
      let reviews = JSON.parse(localStorage.getItem("riseher_reviews")) || [];
      
      // Filter reviews matching active customer
      const filtered = reviews.filter(r => r.customerName === customerName);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-3xl p-12 text-center text-xs text-slate-400 font-bold border border-slate-50 custom-shadow">
            <iconify-icon icon="lucide:star-off" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            You haven't submitted any reviews yet. Completed bookings can be reviewed.
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(r => {
        let repliesHtml = "";
        if (r.replies && r.replies.length > 0) {
          repliesHtml = r.replies.map(rep => `
            <div class="p-3 bg-pink-50/50 rounded-2xl ml-6 mt-3 space-y-1">
              <div class="flex items-center gap-1.5 font-extrabold text-[10px] text-pink-600">
                <iconify-icon icon="lucide:reply"></iconify-icon>
                <span>Reply from Professional</span>
                <span class="text-slate-400 font-normal">(${rep.date})</span>
              </div>
              <p class="text-xs text-slate-600 leading-normal font-semibold">${rep.text}</p>
            </div>
          `).join("");
        }

        return `
          <div class="bg-white rounded-3xl p-6 border border-slate-50 custom-shadow space-y-4">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-50 pb-4">
              <div>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none block mb-0.5">Reviewed Service</span>
                <span class="text-sm font-extrabold text-slate-800">${r.serviceName}</span>
                <span class="text-[10px] text-slate-400 font-semibold block mt-0.5">${r.date}</span>
              </div>
              <div class="flex items-center gap-3">
                <div class="flex items-center gap-0.5 text-yellow-500">
                  <iconify-icon icon="lucide:star" class="text-sm"></iconify-icon>
                  <span class="text-xs font-bold text-slate-800">${r.rating} / 5</span>
                </div>
                <div class="flex items-center gap-2">
                  <button onclick="editReview('${r.id}')" class="h-8 px-3 border border-slate-200 hover:bg-slate-50 text-slate-600 font-bold rounded-lg text-[10px] flex items-center justify-center gap-1"><iconify-icon icon="lucide:edit-2"></iconify-icon>Edit</button>
                  <button onclick="deleteReview('${r.id}')" class="h-8 px-3 border border-red-200 hover:bg-red-50 text-red-500 font-bold rounded-lg text-[10px] flex items-center justify-center gap-1"><iconify-icon icon="lucide:trash"></iconify-icon>Delete</button>
                </div>
              </div>
            </div>
            
            <p class="text-xs text-slate-600 leading-relaxed font-semibold italic">"${r.text}"</p>
            
            ${repliesHtml}
          </div>
        `;
      }).join("");
    }

    window.editReview = function(reviewId) {
      const reviews = JSON.parse(localStorage.getItem("riseher_reviews")) || [];
      const reviewObj = reviews.find(r => r.id === reviewId);
      if (!reviewObj) return;

      const newText = prompt("Update your review details:", reviewObj.text);
      if (newText) {
        const updated = reviews.map(r => r.id === reviewId ? { ...r, text: newText } : r);
        localStorage.setItem("riseher_reviews", JSON.stringify(updated));
        renderReviewsGiven();
      }
    };

    window.deleteReview = function(reviewId) {
      if (confirm("Are you sure you want to delete this review?")) {
        const reviews = JSON.parse(localStorage.getItem("riseher_reviews")) || [];
        const updated = reviews.filter(r => r.id !== reviewId);
        localStorage.setItem("riseher_reviews", JSON.stringify(updated));
        renderReviewsGiven();
      }
    };
  </script>
</body>
</html>
