<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact & Service Area - RiseHer Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-12">
  <div class="bg-white w-full max-w-5xl rounded-[32px] overflow-hidden custom-shadow-lg flex flex-col md:flex-row min-h-[600px]">
    
    <!-- Left Panel: Form Inputs -->
    <div class="flex-1 p-6 md:p-10 flex flex-col justify-between border-r border-slate-50">
      <div class="space-y-6">
        <!-- Header & Steps -->
        <header class="flex items-center gap-3">
          <a href="onboarding-step3.html" class="w-10 h-10 flex items-center justify-center text-slate-800 hover:bg-slate-50 rounded-full transition-colors">
            <iconify-icon icon="lucide:arrow-left" class="text-2xl"></iconify-icon>
          </a>
          <div>
            <h1 class="text-xl font-bold text-slate-900">Contact & Service Area</h1>
            <p class="text-xs text-slate-400">Step 4 of 5 • Verification & Contact</p>
          </div>
        </header>

        <!-- Step Bar -->
        <div class="space-y-2">
          <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div class="progress-bar h-full w-[80%] rounded-full"></div>
          </div>
        </div>

        <!-- Form Fields -->
        <form id="step4-form" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Phone Number</label>
              <div class="flex gap-2">
                <select id="country-code" class="px-3 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-[15px] font-semibold outline-none focus:bg-white focus:border-[#E91E63]">
                  <option selected>+91</option>
                  <option>+1</option>
                  <option>+44</option>
                </select>
                <input type="tel" id="contact-phone" required value="98765 43210" placeholder="Mobile Number" class="flex-1 px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 text-[15px] font-semibold outline-none focus:bg-white focus:border-[#E91E63] transition-all">
              </div>
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Available Timings</label>
              <input type="text" id="contact-timings" required value="Mon - Sat: 9:00 AM - 7:00 PM" placeholder="e.g. Daily: 10AM - 6PM" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 text-[15px] font-semibold outline-none focus:bg-white focus:border-[#E91E63] transition-all">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Service Radius</label>
              <select id="service-radius" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-[15px] font-semibold appearance-none outline-none focus:bg-white focus:border-[#E91E63]">
                <option value="2 km">2 km (Walking distance)</option>
                <option value="5 km" selected>5 km (Local neighborhood)</option>
                <option value="10 km">10 km (Wider city)</option>
                <option value="20 km">20 km (Entire metro area)</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Languages Preferred</label>
              <div class="flex flex-wrap gap-2 pt-1.5">
                <label class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-200 rounded-xl text-xs font-bold cursor-pointer select-none">
                  <input type="checkbox" name="lang-pref" value="Hindi" checked class="accent-[#E91E63]"> Hindi
                </label>
                <label class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-200 rounded-xl text-xs font-bold cursor-pointer select-none">
                  <input type="checkbox" name="lang-pref" value="Marathi" checked class="accent-[#E91E63]"> Marathi
                </label>
                <label class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-200 rounded-xl text-xs font-bold cursor-pointer select-none">
                  <input type="checkbox" name="lang-pref" value="English" checked class="accent-[#E91E63]"> English
                </label>
              </div>
            </div>
          </div>

          <!-- Document Verification Upload -->
          <div class="space-y-2 pt-2">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Aadhar / ID Verification Proof</label>
            <div class="border-2 border-dashed border-slate-200 rounded-2xl p-4 bg-slate-50/50 hover:bg-slate-50 transition-all text-center flex items-center justify-between relative cursor-pointer group">
              <input type="file" id="aadhar-input" class="absolute inset-0 opacity-0 cursor-pointer">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-slate-400 custom-shadow"><iconify-icon icon="lucide:file-text" class="text-xl"></iconify-icon></div>
                <div class="text-left"><p class="text-xs font-bold text-slate-700" id="aadhar-filename">Aadhar_Verification.pdf</p><p class="text-[10px] text-slate-400">PDF, JPG, PNG (Max 5MB)</p></div>
              </div>
              <span class="text-xs font-bold text-[#E91E63] group-hover:underline">Re-upload</span>
            </div>
          </div>
        </form>
      </div>

      <!-- Action Footer -->
      <footer class="pt-8 border-t border-slate-50 flex items-center gap-4">
        <a href="onboarding-step3.html" class="flex-1 h-[54px] flex items-center justify-center border border-slate-200 text-slate-600 font-bold rounded-2xl active:bg-slate-50 transition-all">Previous</a>
        <button type="submit" form="step4-form" class="flex-[2] h-[54px] flex items-center justify-center bg-[#E91E63] text-white font-bold rounded-2xl hover:bg-[#D81B60] active:scale-[0.98] transition-all shadow-lg shadow-pink-100">Next Step</button>
      </footer>
    </div>

    <!-- Right Panel: Desktop Visual Map Summary -->
    <div class="hidden md:flex flex-col items-center justify-center bg-slate-50 p-10 w-[420px] shrink-0 border-l border-slate-100 relative overflow-hidden">
      <!-- Background gradients -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-pink-100 rounded-full filter blur-3xl opacity-30 -mr-20 -mt-20"></div>
      <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-100 rounded-full filter blur-3xl opacity-30 -ml-20 -mb-20"></div>

      <div class="absolute top-8 left-8 flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
        <iconify-icon icon="lucide:eye" class="text-lg"></iconify-icon> Service Reach
      </div>

      <!-- Simulated local map reach circle -->
      <div class="w-full max-w-[300px] bg-white rounded-3xl p-5 custom-shadow-lg relative z-10 space-y-4 text-center">
        <div class="w-full aspect-square rounded-2xl bg-[#f5f3ff] flex flex-col items-center justify-center relative border border-slate-100 overflow-hidden">
          <!-- Animated radar circle -->
          <div class="absolute w-40 h-40 border border-[#E91E63]/20 rounded-full animate-ping opacity-60"></div>
          <div class="absolute w-28 h-28 bg-[#E91E63]/10 border-2 border-dashed border-[#E91E63]/30 rounded-full flex items-center justify-center">
            <div class="w-10 h-10 bg-[#E91E63] rounded-full border-4 border-white flex items-center justify-center text-white shadow shadow-pink-200">
              <iconify-icon icon="lucide:user" class="text-sm"></iconify-icon>
            </div>
          </div>
          <div class="absolute bottom-3 text-[10px] font-bold text-[#E91E63] uppercase tracking-wider bg-white px-3 py-1 rounded-full custom-shadow">
            Radius: <span id="preview-radius">5 km</span>
          </div>
        </div>

        <div class="text-left space-y-2 font-semibold">
          <div class="flex items-center justify-between text-xs">
            <span class="text-slate-400">Hours</span>
            <span id="preview-timings" class="text-slate-700 text-right truncate max-w-[150px]">Mon - Sat: 9AM - 7PM</span>
          </div>
          <div class="flex items-center justify-between text-xs">
            <span class="text-slate-400">Languages</span>
            <span id="preview-languages" class="text-slate-700 text-right truncate max-w-[150px]">Hindi, Marathi, English</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const phoneInput = document.getElementById("contact-phone");
    const codeSelect = document.getElementById("country-code");
    const timingInput = document.getElementById("contact-timings");
    const radiusSelect = document.getElementById("service-radius");
    const langCheckbox = document.getElementsByName("lang-pref");

    const pRadius = document.getElementById("preview-radius");
    const pTimings = document.getElementById("preview-timings");
    const pLanguages = document.getElementById("preview-languages");

    function updateSummary() {
      pRadius.textContent = radiusSelect.value;
      pTimings.textContent = timingInput.value || "Not Set";
      
      const langs = Array.from(langCheckbox).filter(cb => cb.checked).map(cb => cb.value);
      pLanguages.textContent = langs.join(", ") || "None Selected";
    }

    timingInput.addEventListener("input", updateSummary);
    radiusSelect.addEventListener("change", updateSummary);
    langCheckbox.forEach(cb => cb.addEventListener("change", updateSummary));

    // File feedback
    const aadharInput = document.getElementById("aadhar-input");
    const aadharFilename = document.getElementById("aadhar-filename");
    aadharInput.addEventListener("change", function() {
      if (this.files[0]) {
        aadharFilename.textContent = this.files[0].name;
      }
    });

    // Submit
    document.getElementById("step4-form").addEventListener("submit", (e) => {
      e.preventDefault();

      const profile = Auth.getProfile();
      if (profile) {
        profile.phone = codeSelect.value + " " + phoneInput.value;
        profile.availableTimings = timingInput.value;
        profile.serviceRadius = radiusSelect.value;
        profile.languages = Array.from(langCheckbox).filter(cb => cb.checked).map(cb => cb.value);
        profile.completionScore = 80; // step 5 details
        
        Auth.saveProfile(profile);
      }

      window.location.href = "onboarding-step5.html";
    });

    updateSummary();
  </script>
</body>
</html>
