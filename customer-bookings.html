<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Bookings - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 max-w-4xl space-y-6">
        
        <header class="flex items-center justify-between">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">My Bookings</h2>
            <p class="text-xs text-slate-500 font-semibold">Track scheduling, view details, reschedule, or communicate with professionals.</p>
          </div>
        </header>

        <!-- Bookings Status Filter Tabs -->
        <nav class="flex gap-4 border-b border-slate-100 pb-px overflow-x-auto no-scrollbar font-bold text-xs">
          <button onclick="switchBookingTab('all')" id="tab-all" class="py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap">All Bookings</button>
          <button onclick="switchBookingTab('Pending')" id="tab-Pending" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Pending Approval</button>
          <button onclick="switchBookingTab('Confirmed')" id="tab-Confirmed" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Confirmed / Upcoming</button>
          <button onclick="switchBookingTab('Completed')" id="tab-Completed" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Completed</button>
          <button onclick="switchBookingTab('Cancelled')" id="tab-Cancelled" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Cancelled / Rejected</button>
        </nav>

        <!-- Bookings Cards List Container -->
        <section id="bookings-cards-container" class="space-y-4">
          <!-- Dynamically populated -->
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    let activeFilter = "all";

    document.addEventListener("DOMContentLoaded", () => {
      renderCustomerBookings();
    });

    function renderCustomerBookings() {
      const container = document.getElementById("bookings-cards-container");
      if (!container) return;

      const bookings = JSON.parse(localStorage.getItem(Auth.KEYS.USER_BOOKINGS)) || [];
      
      // Filter bookings (In a real app, we filter by customer ID. Here, we show all bookings for preview convenience)
      let filtered = bookings;
      if (activeFilter !== "all") {
        filtered = bookings.filter(b => b.status === activeFilter);
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-3xl p-12 text-center text-xs text-slate-400 font-bold border border-slate-50 custom-shadow">
            <iconify-icon icon="lucide:calendar" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            No bookings found matching this status
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(b => {
        let statusColor = "text-orange-600 bg-orange-50 border-orange-100";
        if (b.status === "Confirmed") statusColor = "text-green-600 bg-green-50 border-green-100";
        if (b.status === "In Progress") statusColor = "text-indigo-600 bg-indigo-50 border-indigo-100";
        if (b.status === "Completed") statusColor = "text-blue-600 bg-blue-50 border-blue-100";
        if (b.status === "Cancelled" || b.status === "Rejected") statusColor = "text-red-500 bg-red-50 border-red-100";

        // Find matching professional to get rates and location details if needed
        const pro = (window.PROFESSIONALS || []).find(p => p.services.some(s => s.name === b.serviceName)) || window.PROFESSIONALS[0];
        const proName = pro ? pro.name : "RiseHer Professional";

        let actionButtons = `
          <a href="booking-details.html?id=${b.id}" class="h-10 px-4 bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold rounded-xl text-xs flex items-center justify-center transition-colors">Details</a>
        `;

        if (b.status === "Pending" || b.status === "Confirmed") {
          actionButtons = `
            <button onclick="triggerReschedule('${b.id}')" class="h-10 px-4 border border-slate-200 hover:bg-slate-50 text-slate-600 font-bold rounded-xl text-xs flex items-center justify-center transition-all">Reschedule</button>
            <button onclick="cancelBooking('${b.id}')" class="h-10 px-4 border border-red-200 hover:bg-red-50 text-red-500 font-bold rounded-xl text-xs flex items-center justify-center transition-all">Cancel</button>
            <a href="booking-details.html?id=${b.id}" class="h-10 px-4 bg-[#E91E63] text-white font-bold rounded-xl text-xs flex items-center justify-center hover:bg-[#D81B60] transition-colors">View details</a>
          `;
        }

        return `
          <div class="bg-white rounded-3xl p-5 border border-slate-50 custom-shadow flex flex-col md:flex-row md:items-center justify-between gap-6 hover:scale-[1.01] transition-transform">
            <div class="flex items-center gap-4 min-w-0">
              <div class="w-14 h-14 bg-pink-50 rounded-2xl flex items-center justify-center shrink-0">
                <iconify-icon icon="lucide:calendar" class="text-2xl text-[#E91E63]"></iconify-icon>
              </div>
              <div class="min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <h4 class="font-extrabold text-slate-900 text-sm truncate">${proName}</h4>
                  <span class="px-2.5 py-0.5 border rounded-full text-[9px] font-bold uppercase tracking-wider ${statusColor}">${b.status}</span>
                </div>
                <p class="text-xs font-bold text-slate-500 truncate mt-0.5">${b.serviceName}</p>
                <p class="text-[10px] text-slate-400 font-bold mt-1.5 flex items-center gap-1">
                  <iconify-icon icon="lucide:clock" class="text-xs"></iconify-icon>
                  <span>${b.date} • ${b.time} (${b.duration})</span>
                </p>
              </div>
            </div>

            <div class="flex items-center justify-between md:justify-end gap-4 border-t md:border-none border-slate-50 pt-4 md:pt-0 shrink-0">
              <div class="text-left md:text-right pr-4">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none block mb-0.5">Amount</span>
                <span class="text-lg font-black text-slate-900">₹ ${b.price}</span>
              </div>
              <div class="flex items-center gap-2">
                ${actionButtons}
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    window.switchBookingTab = function(status) {
      activeFilter = status;
      ["all", "Pending", "Confirmed", "Completed", "Cancelled"].forEach(s => {
        const btn = document.getElementById(`tab-${s}`);
        if (!btn) return;
        if (s === status) {
          btn.className = "py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap font-bold text-xs";
        } else {
          btn.className = "py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap font-bold text-xs";
        }
      });
      renderCustomerBookings();
    };

    window.cancelBooking = function(id) {
      if (confirm("Are you sure you want to cancel this booking?")) {
        const bookings = JSON.parse(localStorage.getItem(Auth.KEYS.USER_BOOKINGS)) || [];
        const updated = bookings.map(b => b.id === id ? { ...b, status: "Cancelled", paymentStatus: "Unpaid" } : b);
        localStorage.setItem(Auth.KEYS.USER_BOOKINGS, JSON.stringify(updated));
        
        // Add notification
        const notifs = JSON.parse(localStorage.getItem(Auth.KEYS.USER_NOTIFICATIONS)) || [];
        notifs.unshift({
          id: "notif_" + Date.now(),
          type: "booking",
          title: "Booking Cancelled",
          message: `You cancelled booking request #${id}`,
          time: "Just now",
          isRead: false,
          link: "customer-bookings.html"
        });
        localStorage.setItem(Auth.KEYS.USER_NOTIFICATIONS, JSON.stringify(notifs));
        
        renderCustomerBookings();
      }
    };

    window.triggerReschedule = function(id) {
      const newDate = prompt("Enter new preferred date (e.g. 30 Jun, 2026):");
      if (newDate) {
        const bookings = JSON.parse(localStorage.getItem(Auth.KEYS.USER_BOOKINGS)) || [];
        const updated = bookings.map(b => b.id === id ? { ...b, date: newDate, status: "Pending" } : b);
        localStorage.setItem(Auth.KEYS.USER_BOOKINGS, JSON.stringify(updated));
        
        // Add notification
        const notifs = JSON.parse(localStorage.getItem(Auth.KEYS.USER_NOTIFICATIONS)) || [];
        notifs.unshift({
          id: "notif_" + Date.now(),
          type: "booking",
          title: "Booking Rescheduled",
          message: `Booking #${id} rescheduled request sent for ${newDate}`,
          time: "Just now",
          isRead: false,
          link: "customer-bookings.html"
        });
        localStorage.setItem(Auth.KEYS.USER_NOTIFICATIONS, JSON.stringify(notifs));
        
        renderCustomerBookings();
      }
    };
  </script>
</body>
</html>
