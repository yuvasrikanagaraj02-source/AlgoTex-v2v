<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Profile - RiseHer Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-12">
  <div class="bg-white w-full max-w-5xl rounded-[32px] overflow-hidden custom-shadow-lg flex flex-col md:flex-row min-h-[600px]">
    
    <!-- Left Panel: Form Input -->
    <div class="flex-1 p-6 md:p-10 flex flex-col justify-between border-r border-slate-50">
      <div class="space-y-6">
        <!-- Header & Steps -->
        <header class="flex items-center gap-3">
          <a href="index.html" class="w-10 h-10 flex items-center justify-center text-slate-800 hover:bg-slate-50 rounded-full transition-colors">
            <iconify-icon icon="lucide:arrow-left" class="text-2xl"></iconify-icon>
          </a>
          <div>
            <h1 class="text-xl font-bold text-slate-900">Create Profile</h1>
            <p class="text-xs text-slate-400">Step 1 of 5 • Basic Details</p>
          </div>
        </header>

        <!-- Step Bar -->
        <div class="space-y-2">
          <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div class="progress-bar h-full w-[20%] rounded-full"></div>
          </div>
        </div>

        <!-- Avatar Upload Section -->
        <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
          <div class="relative group">
            <div class="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center overflow-hidden border-2 border-white custom-shadow">
              <img id="avatar-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Priya" class="w-full h-full object-cover">
            </div>
            <input type="file" id="avatar-input" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 rounded-full transition-all flex items-center justify-center text-white pointer-events-none">
              <iconify-icon icon="lucide:camera" class="text-lg"></iconify-icon>
            </div>
          </div>
          <div>
            <h3 class="text-sm font-bold text-slate-800">Profile Picture</h3>
            <p class="text-xs text-slate-500 mt-0.5">Click photo to upload custom image</p>
          </div>
        </div>

        <!-- Form fields -->
        <form id="step1-form" class="space-y-4">
          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Full Name</label>
            <input type="text" id="input-name" required value="Priya Sharma" placeholder="Enter your full name" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 placeholder:text-slate-400 text-[15px] font-semibold transition-all focus:bg-white focus:border-[#E91E63] outline-none">
          </div>
          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Business Name (Optional)</label>
            <input type="text" id="input-business" value="Priya Tailors" placeholder="e.g. Priya Custom Designs" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 placeholder:text-slate-400 text-[15px] font-semibold transition-all focus:bg-white focus:border-[#E91E63] outline-none">
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Profession / Skill</label>
              <div class="relative">
                <select id="input-profession" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 text-[15px] font-semibold appearance-none outline-none focus:bg-white focus:border-[#E91E63]">
                  <option value="Tailoring Specialist" selected>Tailoring Specialist</option>
                  <option value="Beautician">Beautician</option>
                  <option value="Embroidery Worker">Embroidery Worker</option>
                  <option value="Aari Worker">Aari Worker</option>
                  <option value="Mehendi Artist">Mehendi Artist</option>
                  <option value="Cooking Chef">Cooking Chef</option>
                  <option value="Home Teacher">Home Teacher</option>
                </select>
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
                  <iconify-icon icon="lucide:chevron-down"></iconify-icon>
                </div>
              </div>
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Experience</label>
              <div class="relative">
                <select id="input-experience" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 text-[15px] font-semibold appearance-none outline-none focus:bg-white focus:border-[#E91E63]">
                  <option value="Fresher">Fresher</option>
                  <option value="1-3 Years">1-3 Years</option>
                  <option value="3-5 Years">3-5 Years</option>
                  <option value="5+ Years" selected>5+ Years</option>
                </select>
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
                  <iconify-icon icon="lucide:chevron-down"></iconify-icon>
                </div>
              </div>
            </div>
          </div>
          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Location</label>
            <div class="relative">
              <input type="text" id="input-location" required value="Mumbai, Maharashtra" placeholder="Enter neighborhood or city" class="w-full pl-4 pr-12 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 placeholder:text-slate-400 text-[15px] font-semibold transition-all focus:bg-white focus:border-[#E91E63] outline-none">
              <div class="absolute inset-y-0 right-4 flex items-center text-slate-400 pointer-events-none">
                <iconify-icon icon="lucide:map-pin" class="text-xl"></iconify-icon>
              </div>
            </div>
          </div>
        </form>
      </div>

      <!-- Action Footer -->
      <footer class="pt-8 border-t border-slate-50 flex items-center gap-4">
        <a href="index.html" class="flex-1 h-[54px] flex items-center justify-center border border-slate-200 text-slate-600 font-bold rounded-2xl active:bg-slate-50 transition-all">Previous</a>
        <button type="submit" form="step1-form" class="flex-[2] h-[54px] flex items-center justify-center bg-[#E91E63] text-white font-bold rounded-2xl hover:bg-[#D81B60] active:scale-[0.98] transition-all shadow-lg shadow-pink-100">Next Step</button>
      </footer>
    </div>

    <!-- Right Panel: Interactive Desktop Mockup Card -->
    <div class="hidden md:flex flex-col items-center justify-center bg-slate-50 p-10 w-[420px] shrink-0 border-l border-slate-100 relative overflow-hidden">
      <!-- Background decorative gradients -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-pink-100 rounded-full filter blur-3xl opacity-30 -mr-20 -mt-20"></div>
      <div class="absolute bottom-0 left-0 w-64 h-64 bg-indigo-100 rounded-full filter blur-3xl opacity-30 -ml-20 -mb-20"></div>

      <!-- Preview Header Nudge -->
      <div class="absolute top-8 left-8 flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
        <iconify-icon icon="lucide:eye" class="text-lg"></iconify-icon> Live Card Preview
      </div>

      <!-- Card Mockup -->
      <div class="w-full max-w-[320px] bg-white rounded-3xl p-6 custom-shadow-lg space-y-6 relative z-10 hover:scale-[1.02] transition-transform">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 rounded-full overflow-hidden border-2 border-pink-50 ring-4 ring-pink-50/20 shadow-sm shrink-0">
            <img id="preview-card-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Priya" class="w-full h-full object-cover">
          </div>
          <div class="min-w-0">
            <div class="flex items-center gap-1.5">
              <h3 id="preview-card-name" class="font-extrabold text-slate-900 truncate">Priya Sharma</h3>
              <iconify-icon icon="lucide:shield-check" class="text-green-500 text-base shrink-0" title="Verified Professional"></iconify-icon>
            </div>
            <p id="preview-card-business" class="text-xs font-bold text-pink-600 truncate">Priya Tailors</p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 border-t border-b border-slate-50 py-4 font-semibold">
          <div class="space-y-1">
            <p class="text-[9px] font-bold text-slate-400 uppercase">Profession</p>
            <p id="preview-card-profession" class="text-xs text-slate-800">Tailoring Specialist</p>
          </div>
          <div class="space-y-1">
            <p class="text-[9px] font-bold text-slate-400 uppercase">Experience</p>
            <p id="preview-card-experience" class="text-xs text-slate-800">5+ Years</p>
          </div>
        </div>

        <div class="flex items-center justify-between text-xs font-bold">
          <div class="flex items-center gap-1 text-slate-500">
            <iconify-icon icon="lucide:map-pin" class="text-slate-400"></iconify-icon>
            <span id="preview-card-location" class="truncate max-w-[150px]">Mumbai, MH</span>
          </div>
          <span class="px-2 py-0.5 bg-green-50 text-green-600 text-[10px] font-bold rounded-md uppercase">Verified</span>
        </div>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Live update mapping
    const inputName = document.getElementById("input-name");
    const inputBusiness = document.getElementById("input-business");
    const inputProfession = document.getElementById("input-profession");
    const inputExperience = document.getElementById("input-experience");
    const inputLocation = document.getElementById("input-location");

    const previewName = document.getElementById("preview-card-name");
    const previewBusiness = document.getElementById("preview-card-business");
    const previewProfession = document.getElementById("preview-card-profession");
    const previewExperience = document.getElementById("preview-card-experience");
    const previewLocation = document.getElementById("preview-card-location");

    function updateCard() {
      previewName.textContent = inputName.value || "Your Name";
      previewBusiness.textContent = inputBusiness.value || "Independent Pro";
      previewProfession.textContent = inputProfession.value;
      previewExperience.textContent = inputExperience.value;
      previewLocation.textContent = inputLocation.value || "Location";
    }

    inputName.addEventListener("input", updateCard);
    inputBusiness.addEventListener("input", updateCard);
    inputProfession.addEventListener("change", updateCard);
    inputExperience.addEventListener("change", updateCard);
    inputLocation.addEventListener("input", updateCard);

    // Initial fill
    updateCard();

    // File avatar upload mapping
    const avatarInput = document.getElementById("avatar-input");
    const avatarPreview = document.getElementById("avatar-preview");
    const cardAvatar = document.getElementById("preview-card-avatar");

    avatarInput.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          avatarPreview.src = e.target.result;
          cardAvatar.src = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    });

    // Form Submission: Save details to localStorage profile and go step 2
    document.getElementById("step1-form").addEventListener("submit", (e) => {
      e.preventDefault();
      
      const profile = Auth.getProfile() || {};
      profile.name = inputName.value;
      profile.businessName = inputBusiness.value;
      profile.title = inputProfession.value;
      profile.experience = inputExperience.value;
      profile.location = inputLocation.value;
      profile.avatarUrl = avatarPreview.src;
      profile.completionScore = 20; // set onboarding step progress

      Auth.saveProfile(profile);
      window.location.href = "onboarding-step2.html";
    });
  </script>
</body>
</html>
