<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - RiseHer</title>
  <script src="https://cdn.tailwindcss.com font-bold"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 max-w-4xl space-y-6">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="space-y-1">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Notifications Log</h2>
            <p class="text-xs text-slate-500 font-semibold">Track historical notifications, messages, and platform alerts.</p>
          </div>
          <button onclick="markAllNotificationsPageRead()" class="h-11 px-5 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl text-slate-600 font-bold text-xs flex items-center gap-2 custom-shadow shrink-0">
            <iconify-icon icon="lucide:check-check" class="text-base"></iconify-icon>Mark all as read
          </button>
        </header>

        <!-- Category Tabs -->
        <nav class="flex gap-4 border-b border-slate-100 pb-px overflow-x-auto no-scrollbar font-bold text-xs">
          <button onclick="filterNotifs('all')" id="tab-notif-all" class="py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap">All Alerts</button>
          <button onclick="filterNotifs('booking')" id="tab-notif-booking" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Bookings</button>
          <button onclick="filterNotifs('message')" id="tab-notif-message" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Messages</button>
          <button onclick="filterNotifs('payment')" id="tab-notif-payment" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Payments</button>
          <button onclick="filterNotifs('system')" id="tab-notif-system" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">System</button>
        </nav>

        <!-- Alerts Stack list -->
        <section id="notifications-page-list" class="space-y-4">
          <!-- Dynamically populated -->
        </section>

      </main>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    let activeNotifFilter = "all";

    document.addEventListener("DOMContentLoaded", renderNotificationsPage);

    function renderNotificationsPage() {
      const container = document.getElementById("notifications-page-list");
      if (!container) return;

      const notifs = JSON.parse(localStorage.getItem(Auth.KEYS.USER_NOTIFICATIONS)) || [];
      const filtered = activeNotifFilter === "all" ? notifs : notifs.filter(n => n.type === activeNotifFilter);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-3xl p-12 text-center text-xs text-slate-400 font-bold border border-slate-50 custom-shadow">
            <iconify-icon icon="lucide:bell-off" class="text-4xl text-slate-200 mb-2 block mx-auto"></iconify-icon>
            No notifications found under this filter
          </div>
        `;
        return;
      }

      const iconMap = {
        booking: "lucide:calendar-plus",
        message: "lucide:message-square",
        payment: "lucide:check-circle",
        system: "lucide:award",
        promotion: "lucide:sparkles"
      };

      const themeMap = {
        booking: "text-[#E91E63] bg-pink-50",
        message: "text-indigo-500 bg-indigo-50",
        payment: "text-green-500 bg-green-50",
        system: "text-yellow-600 bg-yellow-50",
        promotion: "text-purple-600 bg-purple-50"
      };

      container.innerHTML = filtered.map(notif => {
        const isUnread = !notif.isRead;
        const icon = iconMap[notif.type] || "lucide:bell";
        const theme = themeMap[notif.type] || "text-slate-500 bg-slate-50";

        return `
          <div class="bg-white p-5 rounded-3xl border border-slate-50 custom-shadow flex items-center justify-between gap-4 hover:scale-[1.01] transition-transform ${isUnread ? 'bg-blue-50/10' : ''}">
            <div class="flex items-center gap-4">
              <!-- Unread dot -->
              <span class="w-2 h-2 rounded-full bg-blue-500 shrink-0 ${isUnread ? 'opacity-100' : 'opacity-0'}"></span>
              
              <div class="w-11 h-11 ${theme} rounded-2xl flex items-center justify-center shrink-0">
                <iconify-icon icon="${icon}" class="text-xl"></iconify-icon>
              </div>
              <div class="font-semibold text-xs text-slate-600">
                <h4 class="font-extrabold text-slate-900 text-sm">${notif.title}</h4>
                <p class="mt-1">${notif.message}</p>
                <span class="text-[9px] text-slate-400 mt-1 block">${notif.time}</span>
              </div>
            </div>
            <a href="${notif.link}" onclick="layoutReadNotification('${notif.id}')" class="h-9 px-4 bg-slate-900 text-white rounded-xl text-[10px] font-bold hover:bg-slate-800 flex items-center justify-center shrink-0">View Details</a>
          </div>
        `;
      }).join("");
    }

    window.filterNotifs = function(type) {
      activeNotifFilter = type;
      
      ["all", "booking", "message", "payment", "system"].forEach(t => {
        const btn = document.getElementById(`tab-notif-${t}`);
        if (!btn) return;
        if (t === type) {
          btn.className = "py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap font-bold text-xs";
        } else {
          btn.className = "py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap font-bold text-xs";
        }
      });

      renderNotificationsPage();
    };

    window.markAllNotificationsPageRead = function() {
      // Call shared layout.js trigger
      layoutMarkAllNotificationsRead();
    }
  </script>
</body>
</html>
