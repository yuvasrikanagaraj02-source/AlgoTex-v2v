<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Details - RiseHer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/index.css">
  <link rel="icon" href="assets/icons/favicon.ico">
</head>
<body class="bg-[#FAFAFA]">

  <div class="flex min-h-screen flex-col md:flex-row">
    <!-- Desktop Sidebar wrapper -->
    <div id="layout-sidebar" class="hidden md:block w-[280px] shrink-0 fixed left-0 top-0 h-screen z-50"></div>

    <div class="flex-1 flex flex-col md:ml-[280px]">
      <!-- Header wrapper -->
      <header id="layout-header" class="shrink-0 bg-white border-b border-slate-100 px-6 py-4 md:px-12 md:py-6 sticky top-0 z-40"></header>
      
      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 pb-[100px] md:pb-12 max-w-4xl space-y-8">
        
        <!-- Back Navigation -->
        <header class="flex items-center gap-4">
          <a href="search.html" class="w-10 h-10 flex items-center justify-center text-slate-800 hover:bg-slate-50 rounded-full transition-colors">
            <iconify-icon icon="lucide:arrow-left" class="text-2xl"></iconify-icon>
          </a>
          <div>
            <h2 class="text-xl font-black text-slate-900 tracking-tight leading-none">Professional Profile</h2>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">Provider Showcase</p>
          </div>
        </header>

        <!-- Professional Header Card -->
        <section class="bg-white rounded-[32px] p-6 md:p-8 border border-slate-50 custom-shadow flex flex-col md:flex-row gap-6 justify-between items-start md:items-center">
          <div class="flex items-center gap-5">
            <img id="pro-avatar-img" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=150&h=150" class="w-20 h-20 rounded-[24px] object-cover ring-4 ring-pink-50" alt="Avatar">
            <div class="space-y-1">
              <div class="flex items-center gap-1.5 flex-wrap">
                <h3 id="pro-name-display" class="text-xl font-black text-slate-900">Priya Sharma</h3>
                <iconify-icon id="pro-verified-badge" icon="lucide:shield-check" class="text-green-500 text-lg shrink-0" title="Verified Provider"></iconify-icon>
              </div>
              <p id="pro-title-display" class="text-xs font-bold text-pink-600">Bridal Tailoring Specialist</p>
              <div class="flex items-center gap-3 text-[10px] text-slate-400 font-bold flex-wrap">
                <span class="flex items-center gap-1"><iconify-icon icon="lucide:map-pin"></iconify-icon><span id="pro-location-display">Mumbai</span></span>
                <span class="flex items-center gap-1 text-yellow-500"><iconify-icon icon="lucide:star"></iconify-icon><span id="pro-rating-display">4.9</span> (<span id="pro-reviews-display">125</span> reviews)</span>
              </div>
            </div>
          </div>
          
          <div class="flex items-center gap-3 w-full md:w-auto mt-4 md:mt-0">
            <button onclick="toggleSaveProfile()" id="save-profile-btn" class="flex-1 md:flex-none h-11 px-4 border border-slate-200 text-slate-400 hover:text-red-500 rounded-xl text-xs flex items-center justify-center gap-2 transition-all">
              <iconify-icon icon="lucide:heart" class="text-base" id="heart-icon"></iconify-icon>Save
            </button>
            <a href="messages.html" id="message-btn" class="flex-1 md:flex-none h-11 px-5 bg-slate-50 hover:bg-pink-50 hover:text-[#E91E63] text-slate-700 font-bold rounded-xl text-xs flex items-center justify-center gap-2 transition-all">
              <iconify-icon icon="lucide:message-square" class="text-sm"></iconify-icon>Message
            </a>
            <button onclick="openBookingModal()" class="flex-1 md:flex-none h-11 px-6 bg-[#E91E63] text-white font-extrabold rounded-xl text-xs hover:bg-[#D81B60] transition-all shadow-lg shadow-pink-100">
              Book Service
            </button>
          </div>
        </section>

        <!-- Profile Detail Tabs Navigation -->
        <nav class="flex gap-4 border-b border-slate-100 pb-px overflow-x-auto no-scrollbar font-bold text-xs">
          <button onclick="switchProTab('overview')" id="tab-overview" class="py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap">Overview</button>
          <button onclick="switchProTab('services')" id="tab-services" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Services</button>
          <button onclick="switchProTab('portfolio')" id="tab-portfolio" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Portfolio</button>
          <button onclick="switchProTab('reviews')" id="tab-reviews" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Reviews</button>
          <button onclick="switchProTab('availability')" id="tab-availability" class="py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap">Availability</button>
        </nav>

        <!-- Tab 1: Overview Section -->
        <section id="pane-overview" class="space-y-6">
          <div class="bg-white rounded-3xl p-6 border border-slate-50 custom-shadow space-y-4">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest">About Me</h4>
            <p id="pro-bio" class="text-xs text-slate-600 leading-relaxed font-semibold">Bio goes here...</p>
          </div>
        </section>

        <!-- Tab 2: Services Section -->
        <section id="pane-services" class="space-y-6 hidden">
          <div id="services-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Populated from JS -->
          </div>
        </section>

        <!-- Tab 3: Portfolio Section -->
        <section id="pane-portfolio" class="space-y-6 hidden">
          <div id="portfolio-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <!-- Populated from JS -->
          </div>
        </section>

        <!-- Tab 4: Reviews Section -->
        <section id="pane-reviews" class="space-y-6 hidden">
          <div id="reviews-list" class="space-y-4">
            <!-- Populated from JS -->
          </div>
        </section>

        <!-- Tab 5: Availability Section -->
        <section id="pane-availability" class="space-y-6 hidden">
          <div class="bg-white rounded-3xl p-6 border border-slate-50 custom-shadow space-y-4">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Business Timings</h4>
            <div class="grid grid-cols-2 gap-4 text-xs font-semibold text-slate-700">
              <div class="p-4 bg-slate-50 rounded-2xl flex items-center justify-between">
                <span>Working Days</span>
                <span class="font-bold text-slate-900" id="avail-days">Mon - Sat</span>
              </div>
              <div class="p-4 bg-slate-50 rounded-2xl flex items-center justify-between">
                <span>Business Hours</span>
                <span class="font-bold text-slate-900" id="avail-hours">9:00 AM - 7:00 PM</span>
              </div>
            </div>
          </div>
        </section>

      </main>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[1000] hidden items-center justify-center p-4">
      <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-5 animate-in zoom-in-95 duration-200">
        <div class="flex items-center justify-between border-b border-slate-50 pb-3">
          <h4 class="font-extrabold text-slate-900 text-base">Book Service Request</h4>
          <button onclick="closeBookingModal()" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400"><iconify-icon icon="lucide:x" class="text-lg"></iconify-icon></button>
        </div>
        <form onsubmit="submitBooking(event)" class="space-y-4">
          <div class="space-y-1">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Select Service</label>
            <div class="relative">
              <select id="booking-service-select" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-800 appearance-none outline-none focus:bg-white focus:border-[#E91E63]" required>
                <!-- Filled from JS -->
              </select>
              <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                <iconify-icon icon="lucide:chevron-down"></iconify-icon>
              </div>
            </div>
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Select Date</label>
            <input type="date" id="booking-date" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-800 focus:bg-white focus:border-[#E91E63] outline-none" required>
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Preferred Time Slot</label>
            <div class="relative">
              <select id="booking-slot-select" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold text-slate-800 appearance-none outline-none focus:bg-white focus:border-[#E91E63]" required>
                <!-- Filled from JS -->
              </select>
              <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                <iconify-icon icon="lucide:chevron-down"></iconify-icon>
              </div>
            </div>
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-bold text-slate-400 uppercase">Special Instructions / Notes</label>
            <textarea id="booking-notes" placeholder="Specify collar size, style parameters or heavy embroidery preferences..." class="w-full h-20 px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-semibold text-slate-800 focus:bg-white focus:border-[#E91E63] outline-none resize-none"></textarea>
          </div>
          <button type="submit" class="w-full h-11 bg-[#E91E63] text-white font-extrabold rounded-xl text-xs hover:bg-[#D81B60] transition-colors shadow shadow-pink-100">
            Confirm Booking Request
          </button>
        </form>
      </div>
    </div>

    <!-- Mobile Bottom Navigation wrapper -->
    <nav id="layout-mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-100 z-50 px-6 pb-2"></nav>
  </div>
<script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/role.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/router.js"></script>
  <script>
    let activePro = null;

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const proId = urlParams.get("id") || "pro_priya";

      const professionals = window.PROFESSIONALS || [];
      activePro = professionals.find(p => p.id === proId) || professionals[0];

      if (activePro) {
        populateProfile();
      }
    });

    function populateProfile() {
      // General details
      document.getElementById("pro-name-display").textContent = activePro.name;
      document.getElementById("pro-title-display").textContent = activePro.title;
      document.getElementById("pro-location-display").textContent = `${activePro.location}`;
      document.getElementById("pro-rating-display").textContent = activePro.rating.toFixed(1);
      document.getElementById("pro-reviews-display").textContent = activePro.reviewsCount;
      document.getElementById("pro-avatar-img").src = activePro.avatar;
      document.getElementById("pro-bio").textContent = activePro.bio;

      if (activePro.verified) {
        document.getElementById("pro-verified-badge").classList.remove("hidden");
      } else {
        document.getElementById("pro-verified-badge").classList.add("hidden");
      }

      // Check if saved
      const profile = Auth.getProfile();
      const savedIds = profile.savedProfessionals || ["pro_priya", "pro_meena"];
      const btn = document.getElementById("save-profile-btn");
      if (savedIds.includes(activePro.id)) {
        btn.innerHTML = `<iconify-icon icon="lucide:heart" class="text-base text-red-500"></iconify-icon>Saved`;
        btn.classList.add("border-red-200");
      }

      // Services tab
      const servicesContainer = document.getElementById("services-list");
      servicesContainer.innerHTML = activePro.services.map(s => `
        <div class="bg-white rounded-3xl p-5 border border-slate-50 custom-shadow flex flex-col justify-between space-y-4 hover:scale-[1.01] transition-transform">
          <div class="space-y-1">
            <h4 class="font-extrabold text-slate-800 text-sm">${s.name}</h4>
            <p class="text-[11px] text-slate-400 font-semibold">${s.duration} duration</p>
            <p class="text-xs text-slate-500 font-medium leading-relaxed pt-1">${s.description}</p>
          </div>
          <div class="flex items-center justify-between border-t border-slate-50 pt-3.5">
            <span class="text-base font-black text-[#E91E63]">₹ ${s.price}</span>
            <button onclick="openBookingModal('${s.id}')" class="h-9 px-4 bg-[#E91E63] text-white font-bold rounded-lg text-xs hover:bg-[#D81B60] transition-colors">Book Now</button>
          </div>
        </div>
      `).join("");

      // Portfolio tab
      const portfolioContainer = document.getElementById("portfolio-grid");
      portfolioContainer.innerHTML = activePro.portfolio.map(p => `
        <div class="bg-white rounded-2xl overflow-hidden border border-slate-50 custom-shadow hover:scale-[1.02] transition-transform group relative">
          <img src="${p.imageUrl}" class="w-full h-32 object-cover" alt="${p.title}">
          <div class="p-3">
            <h5 class="text-[10px] font-extrabold text-slate-900 truncate">${p.title}</h5>
            <span class="text-[8px] font-bold text-pink-600 block mt-0.5">${p.category}</span>
          </div>
        </div>
      `).join("");

      // Reviews tab
      const reviewsContainer = document.getElementById("reviews-list");
      reviewsContainer.innerHTML = activePro.reviews.map(r => `
        <div class="bg-white rounded-3xl p-5 border border-slate-50 custom-shadow space-y-3">
          <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <img src="${r.avatarUrl}" class="w-9 h-9 rounded-full object-cover ring-2 ring-slate-100" alt="Client">
              <div>
                <h4 class="font-extrabold text-slate-900 text-xs">${r.customerName}</h4>
                <span class="text-[9px] text-slate-400 font-semibold">${r.date}</span>
              </div>
            </div>
            <div class="flex items-center gap-0.5 text-yellow-500">
              <iconify-icon icon="lucide:star" class="text-xs"></iconify-icon>
              <span class="text-[10px] font-bold text-slate-800">${r.rating.toFixed(1)}</span>
            </div>
          </div>
          <p class="text-xs text-slate-600 leading-relaxed font-semibold italic">"${r.text}"</p>
        </div>
      `).join("");

      // Availability tab
      document.getElementById("avail-days").textContent = activePro.availability === "weekdays" ? "Mon - Sat" : (activePro.availability === "weekends" ? "Sat - Sun" : "Mon - Sun");
    }

    window.switchProTab = function(tabName) {
      ["overview", "services", "portfolio", "reviews", "availability"].forEach(t => {
        document.getElementById(`pane-${t}`).classList.add("hidden");
        
        const btn = document.getElementById(`tab-${t}`);
        if (btn) btn.className = "py-3 px-4 text-slate-400 hover:text-slate-600 whitespace-nowrap font-bold text-xs";
      });

      document.getElementById(`pane-${tabName}`).classList.remove("hidden");
      const activeBtn = document.getElementById(`tab-${tabName}`);
      if (activeBtn) activeBtn.className = "py-3 px-4 text-[#E91E63] border-b-2 border-[#E91E63] whitespace-nowrap font-bold text-xs";
    };

    window.toggleSaveProfile = function() {
      const profile = Auth.getProfile();
      let savedIds = profile.savedProfessionals || [];
      const btn = document.getElementById("save-profile-btn");

      if (savedIds.includes(activePro.id)) {
        savedIds = savedIds.filter(id => id !== activePro.id);
        btn.innerHTML = `<iconify-icon icon="lucide:heart" class="text-base text-slate-400"></iconify-icon>Save`;
        btn.classList.remove("border-red-200");
        alert("Removed from Saved Professionals.");
      } else {
        savedIds.push(activePro.id);
        btn.innerHTML = `<iconify-icon icon="lucide:heart" class="text-base text-red-500"></iconify-icon>Saved`;
        btn.classList.add("border-red-200");
        alert("Saved to Favorite Professionals.");
      }

      profile.savedProfessionals = savedIds;
      Auth.saveProfile(profile);
    };

    // Booking actions
    window.openBookingModal = function(serviceId = "") {
      const modal = document.getElementById("booking-modal");
      if (!modal) return;

      modal.classList.remove("hidden");
      modal.classList.add("flex");

      // Set dropdown options
      const serviceSelect = document.getElementById("booking-service-select");
      serviceSelect.innerHTML = activePro.services.map(s => `
        <option value="${s.id}" ${s.id === serviceId ? 'selected' : ''}>${s.name} - ₹${s.price}</option>
      `).join("");

      // Set date defaults (tomorrow)
      const dateInput = document.getElementById("booking-date");
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      dateInput.min = tomorrow.toISOString().split("T")[0];
      dateInput.value = tomorrow.toISOString().split("T")[0];

      // Set time slots dropdown
      const slotSelect = document.getElementById("booking-slot-select");
      slotSelect.innerHTML = activePro.availableSlots.map(slot => `
        <option value="${slot}">${slot}</option>
      `).join("");
    };

    window.closeBookingModal = function() {
      const modal = document.getElementById("booking-modal");
      if (modal) {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }
    };

    window.submitBooking = function(e) {
      e.preventDefault();
      
      const serviceId = document.getElementById("booking-service-select").value;
      const selectedService = activePro.services.find(s => s.id === serviceId);
      const dateVal = document.getElementById("booking-date").value;
      const slotVal = document.getElementById("booking-slot-select").value;
      const notesVal = document.getElementById("booking-notes").value || "No additional requests.";

      // Format date beautifully
      const dateObj = new Date(dateVal);
      const formattedDate = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

      // Create new booking record
      const bookings = JSON.parse(localStorage.getItem(Auth.KEYS.USER_BOOKINGS)) || [];
      const newId = "RH-" + Math.floor(10000 + Math.random() * 90000);
      
      const newBooking = {
        id: newId,
        customerName: "Anjali Sharma",
        customerPhone: "+91 98765 00112",
        serviceName: selectedService.name,
        price: selectedService.price,
        date: formattedDate,
        time: slotVal,
        status: "Pending",
        paymentStatus: "Unpaid",
        paymentMethod: "UPI - GPay",
        duration: selectedService.duration || "2 Hours",
        notes: notesVal,
        avatarUrl: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=150&h=150",
        previousBookingsCount: 1,
        location: "Flat 402, Sunshine Apartments, Goregaon West, Mumbai"
      };

      bookings.unshift(newBooking);
      localStorage.setItem(Auth.KEYS.USER_BOOKINGS, JSON.stringify(bookings));

      // Notification
      const notifs = JSON.parse(localStorage.getItem(Auth.KEYS.USER_NOTIFICATIONS)) || [];
      notifs.unshift({
        id: "notif_" + Date.now(),
        type: "booking",
        title: "Booking Requested",
        message: `Your booking request for ${selectedService.name} is submitted.`,
        time: "Just now",
        isRead: false,
        link: "customer-bookings.html"
      });
      localStorage.setItem(Auth.KEYS.USER_NOTIFICATIONS, JSON.stringify(notifs));

      closeBookingModal();
      alert(`Booking request submitted successfully! Booking ID is ${newId}.`);
      
      // Redirect straight to customer bookings
      window.location.href = "customer-bookings.html";
    };
  </script>
</body>
</html>
